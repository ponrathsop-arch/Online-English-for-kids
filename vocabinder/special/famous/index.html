<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Famous's CVC Vocabinder ⭐</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap');
:root{--bg:#fef9f0;--pink:#ff6b9d;--mint:#06d6a0;--blue:#4a90d9;--coral:#ff6b6b;--purple:#9b72cf;--text:#2d2d2d;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden;user-select:none;}
.bg-blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(60px);opacity:.17;}
.b1{width:280px;height:280px;background:var(--pink);top:-80px;left:-80px;}
.b2{width:240px;height:240px;background:var(--mint);bottom:-60px;right:-60px;}
.b3{width:200px;height:200px;background:#ffd166;top:40%;left:-50px;}

/* HEADER */
.header{position:relative;z-index:10;width:100%;text-align:center;padding:12px 20px 5px;}
.title{font-family:'Fredoka One',cursive;font-size:1.75rem;color:var(--pink);text-shadow:2px 2px 0 rgba(255,107,157,.18);}
.score-row{display:flex;gap:10px;justify-content:center;margin-top:7px;font-weight:800;font-size:.83rem;}
.pill{padding:4px 13px;border-radius:50px;}
.pg{background:rgba(6,214,160,.15);color:#059c74;}
.pr{background:rgba(255,107,107,.15);color:#d44;}
.pb{background:rgba(74,144,217,.15);color:var(--blue);}
.prog-wrap{width:calc(100% - 40px);max-width:400px;height:6px;background:rgba(0,0,0,.08);border-radius:8px;margin:6px auto 0;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:8px;transition:width .4s ease;}

/* MAIN */
.main{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:6px 16px;gap:10px;}

/* CARD */
.card-wrap{position:relative;width:290px;height:300px;}

.vocab-card{
  position:absolute;inset:0;background:white;border-radius:28px;
  box-shadow:0 10px 36px rgba(0,0,0,.13);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  touch-action:none;will-change:transform;border:3px solid rgba(0,0,0,.05);
  transition:box-shadow .15s;
}
.vocab-card.shake{animation:cardShake .45s ease;}
.vocab-card.wrong-flash{border-color:var(--coral)!important;box-shadow:0 0 0 4px rgba(255,107,107,.25),0 10px 36px rgba(0,0,0,.13)!important;}

@keyframes cardShake{
  0%,100%{transform:translateX(0) rotate(0);}
  15%{transform:translateX(-10px) rotate(-2deg);}
  35%{transform:translateX(10px) rotate(2deg);}
  55%{transform:translateX(-7px) rotate(-1deg);}
  75%{transform:translateX(7px) rotate(1deg);}
}

.card-illus{width:190px;height:190px;display:flex;align-items:center;justify-content:center;}
.card-illus svg{width:100%;height:100%;}
.card-hint{font-size:.7rem;color:#ccc;font-weight:700;letter-spacing:1px;text-transform:uppercase;}

/* Swipe direction word peek labels */
.swipe-peek{
  position:absolute;top:50%;transform:translateY(-50%);
  font-family:'Fredoka One',cursive;font-size:1.25rem;
  padding:8px 12px;border-radius:14px;
  opacity:0;pointer-events:none;transition:opacity .06s;
  white-space:nowrap;
}
.peek-left{
  right:calc(100% + 8px);
  background:rgba(255,107,107,.12);color:var(--coral);
  border:2.5px solid var(--coral);
}
.peek-right{
  left:calc(100% + 8px);
  background:rgba(6,214,160,.12);color:var(--mint);
  border:2.5px solid var(--mint);
}

/* CHOICES */
.choices{display:flex;gap:11px;width:100%;max-width:340px;}
.choice-btn{
  flex:1;padding:15px 8px;border-radius:20px;border:3px solid rgba(0,0,0,.07);
  font-family:'Fredoka One',cursive;font-size:1.5rem;cursor:pointer;
  transition:all .14s;background:white;color:var(--text);
  box-shadow:0 4px 14px rgba(0,0,0,.09);outline:none;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.choice-btn:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.14);}
.choice-btn:active{transform:scale(.95);}
.choice-btn .arr{font-size:1rem;opacity:.5;}

/* Hint arrows under card */
.swipe-hint{
  display:flex;justify-content:space-between;width:290px;
  font-size:.7rem;color:#ccc;font-weight:800;
  padding:0 4px;
}

/* CELEBRATE */
.cel-overlay{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;}
.sp{position:absolute;top:-30px;animation:starFall linear forwards;}
@keyframes starFall{
  0%{opacity:1;transform:rotate(0) scale(1);}
  80%{opacity:1;}
  100%{top:110vh;transform:rotate(600deg) scale(.4);opacity:0;}
}

/* FLASH */
.flash-scene{perspective:1200px;width:290px;height:190px;cursor:pointer;}
.flash-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.flash-inner.flipped{transform:rotateY(180deg);}
.flash-face{position:absolute;inset:0;border-radius:26px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 8px 28px rgba(0,0,0,.12);}
.ff-front{background:linear-gradient(145deg,#fff8fc,#f8f4ff);border:3px solid rgba(155,114,207,.2);}
.ff-back{background:linear-gradient(145deg,#f0fff9,#f0f8ff);border:3px solid rgba(6,214,160,.22);transform:rotateY(180deg);}
.fl-big{font-family:'Fredoka One',cursive;font-size:3.8rem;color:var(--purple);letter-spacing:5px;text-shadow:3px 3px 0 rgba(155,114,207,.12);}
.ff-back .fl-big{color:var(--mint);font-size:2.6rem;}
.fl-sub{font-size:.72rem;color:#bbb;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
.fl-illus{width:70px;height:70px;}
.fl-illus svg{width:100%;height:100%;}
.flash-nav{display:flex;gap:12px;align-items:center;}
.fnav{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.1);transition:all .15s;}
.fnav:hover{transform:translateY(-2px) scale(1.06);}
.fnav:active{transform:scale(.93);}
.fp{background:white;color:var(--text);}
.fn{background:var(--pink);color:white;}
.fl-ctr{font-size:.78rem;color:#bbb;font-weight:800;text-align:center;}

/* MODE BAR */
.mode-bar{position:relative;z-index:10;display:flex;background:white;border-radius:50px;padding:4px;box-shadow:0 4px 16px rgba(0,0,0,.1);margin-bottom:12px;}
.mode-tab{padding:9px 20px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:.86rem;cursor:pointer;color:#aaa;background:transparent;transition:all .25s;display:flex;align-items:center;gap:5px;}
.mode-tab.on{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;box-shadow:0 4px 14px rgba(155,114,207,.3);}

/* COMPLETION */
.completion{display:none;flex-direction:column;align-items:center;gap:12px;text-align:center;}
.completion.on{display:flex;animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.comp-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--pink);}
.comp-stats{font-size:.92rem;color:#888;font-weight:700;}
.replay-btn{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;border:none;border-radius:50px;padding:13px 38px;font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;box-shadow:0 6px 20px rgba(155,114,207,.3);transition:all .2s;}
.replay-btn:hover{transform:translateY(-3px);}
</style>
</head>
<body>
<div class="bg-blob b1"></div>
<div class="bg-blob b2"></div>
<div class="bg-blob b3"></div>
<div class="cel-overlay" id="cel"></div>

<div class="header">
  <div class="title">⭐ Famous's CVC ⭐</div>
  <div class="score-row" id="score-row">
    <div class="pill pg">✅ <span id="nc">0</span></div>
    <div class="pill pr">❌ <span id="nw">0</span></div>
    <div class="pill pb">📚 <span id="nd">0</span> / <span id="nt">30</span></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</div>

<div class="main" id="main">

  <!-- SWIPE MODE -->
  <div id="swipe-area">
    <div class="swipe-hint">
      <span>👈 swipe left</span>
      <span>swipe right 👉</span>
    </div>

    <div class="card-wrap" id="card-wrap">
      <!-- word peeks shown when dragging -->
      <div class="swipe-peek peek-left"  id="peek-left"></div>
      <div class="swipe-peek peek-right" id="peek-right"></div>
      <div class="vocab-card" id="the-card">
        <div class="card-illus" id="cillus"></div>
        <div class="card-hint">which word?</div>
      </div>
    </div>

    <!-- LEFT button = swipe left, RIGHT button = swipe right -->
    <div class="choices">
      <button class="choice-btn" id="ba" onclick="pickBtn(0)">
        <span class="arr">👈</span><span id="ba-txt">CAT</span>
      </button>
      <button class="choice-btn" id="bb" onclick="pickBtn(1)">
        <span id="bb-txt">HAT</span><span class="arr">👉</span>
      </button>
    </div>
  </div>

  <!-- FLASH MODE -->
  <div id="flash-area" style="display:none">
    <div class="flash-scene" onclick="doFlip()">
      <div class="flash-inner" id="fi">
        <div class="flash-face ff-front">
          <div class="fl-big" id="fw-front">CAT</div>
          <div class="fl-sub">tap to see picture</div>
        </div>
        <div class="flash-face ff-back">
          <div class="fl-illus" id="fillus"></div>
          <div class="fl-big" id="fw-back">CAT</div>
          <div class="fl-sub" id="ffam">-AT family</div>
        </div>
      </div>
    </div>
    <div class="flash-nav" style="margin-top:9px;">
      <button class="fnav fp" onclick="fNav(-1)">◀</button>
      <button class="fnav fn" onclick="fNav(1)">▶</button>
    </div>
    <div class="fl-ctr" id="flctr">1 / 30</div>
  </div>

  <!-- COMPLETION -->
  <div class="completion" id="comp">
    <div style="font-size:3.8rem">🏆</div>
    <div class="comp-title">Amazing, Famous!</div>
    <div class="comp-stats" id="cstats"></div>
    <button class="replay-btn" onclick="restart()">Play Again! 🎉</button>
  </div>
</div>

<div class="mode-bar">
  <button class="mode-tab on" id="ts" onclick="setMode('swipe')">🃏 Swipe Game</button>
  <button class="mode-tab"    id="tf" onclick="setMode('flash')">📖 Flash Cards</button>
</div>

};

/* ── WORD DATA ── */
const WORDS=[
  {word:'can',family:'an'},{word:'fan',family:'an'},{word:'man',family:'an'},
  {word:'pan',family:'an'},{word:'ran',family:'an'},{word:'van',family:'an'},
  {word:'bat',family:'at'},{word:'cat',family:'at'},{word:'hat',family:'at'},
  {word:'mat',family:'at'},{word:'rat',family:'at'},{word:'sat',family:'at'},
  {word:'bet',family:'et'},{word:'get',family:'et'},{word:'jet',family:'et'},
  {word:'net',family:'et'},{word:'pet',family:'et'},{word:'set',family:'et'},{word:'wet',family:'et'},
  {word:'bed',family:'ed'},{word:'fed',family:'ed'},{word:'led',family:'ed'},
  {word:'red',family:'ed'},{word:'wed',family:'ed'},
  {word:'bin',family:'in'},{word:'fin',family:'in'},{word:'pin',family:'in'},
  {word:'sin',family:'in'},{word:'tin',family:'in'},{word:'win',family:'in'},
];

/* ── STATE ── */
let mode='swipe', deck=[], idx=0, nC=0, nW=0;
let fdeck=[], fi=0, flipped=false, locked=false;
let dragX=0, dragging=false, startX=0;
// choices[0]=left btn, choices[1]=right btn
let choices=[];

const STARS=['⭐','🌟','✨','🎊','🎉','💫','🌈','🎈'];

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ── INIT ── */
function init(){
  deck=shuffle([...WORDS]); idx=nC=nW=0; locked=false;
  document.getElementById('nt').textContent=deck.length;
  updateHUD();
  document.getElementById('comp').classList.remove('on');
  document.getElementById('swipe-area').style.display=mode==='swipe'?'':'none';
  document.getElementById('flash-area').style.display=mode==='flash'?'':'none';
  if(mode==='swipe') renderCard();
  else initFlash();
}

/* ── SWIPE GAME ── */
function renderCard(){
  if(idx>=deck.length){showComp();return;}
  const item=deck[idx];

  // pick one wrong answer
  const pool=WORDS.filter(w=>w.word!==item.word);
  const wrong=pool[Math.floor(Math.random()*pool.length)];

  // randomise: correct goes left or right randomly
  choices=shuffle([item,wrong]); // choices[0]=left, choices[1]=right

  document.getElementById('cillus').innerHTML=SVG[item.word]||'';

  // update buttons: left btn = choices[0], right btn = choices[1]
  document.getElementById('ba-txt').textContent=choices[0].word.toUpperCase();
  document.getElementById('bb-txt').textContent=choices[1].word.toUpperCase();

  // update peek labels
  document.getElementById('peek-left').textContent=choices[0].word.toUpperCase();
  document.getElementById('peek-right').textContent=choices[1].word.toUpperCase();

  // reset button styles
  document.getElementById('ba').className='choice-btn';
  document.getElementById('bb').className='choice-btn';

  // reset card
  const card=document.getElementById('the-card');
  card.style.transition='none';
  card.style.transform='translateX(0) rotate(0)';
  card.style.opacity='1';
  card.classList.remove('shake','wrong-flash');
  document.getElementById('peek-left').style.opacity=0;
  document.getElementById('peek-right').style.opacity=0;

  locked=false;
  setupDrag();
}

// pickBtn: 0=left button clicked, 1=right button clicked
function pickBtn(side){
  if(locked) return;
  // side 0 = left choice, side 1 = right choice
  const chosen=choices[side];
  const correct=deck[idx];
  const isOk=chosen.word===correct.word;
  resolveAnswer(isOk, side);
}

function resolveAnswer(isOk, side){
  if(locked) return;
  locked=true;

  if(isOk){
    nC++;
    playTone('correct');
    celebrate();
    // fly toward the side chosen
    flyOut(side===0?'left':'right');
  } else {
    nW++;
    playTone('wrong');
    wrongFeedback();
    // fly toward the side chosen (wrong side)
    flyOut(side===0?'left':'right');
  }

  updateHUD();
  setTimeout(()=>{idx++; renderCard();}, isOk ? 600 : 800);
}

function flyOut(dir){
  const card=document.getElementById('the-card');
  card.style.transition='transform .45s ease, opacity .4s';
  const x=dir==='right'?400:-400;
  const r=dir==='right'?18:-18;
  card.style.transform=`translateX(${x}px) rotate(${r}deg)`;
  card.style.opacity='0';
}

function wrongFeedback(){
  const card=document.getElementById('the-card');
  card.classList.add('wrong-flash');
  // We do a quick shake then fly out — shake is 0.45s, fly starts at 0.5s via resolveAnswer timeout
  card.classList.add('shake');
  setTimeout(()=>card.classList.remove('shake'),450);
}

/* ── DRAG / SWIPE ── */
function setupDrag(){
  const card=document.getElementById('the-card');
  card.onmousedown=e=>startDrag(e.clientX);
  card.ontouchstart=e=>{e.preventDefault();startDrag(e.touches[0].clientX);};
}

function startDrag(x){
  if(locked) return;
  dragging=true; startX=x; dragX=0;
  const card=document.getElementById('the-card');

  function onMove(cx){
    if(!dragging) return;
    dragX=cx-startX;
    const rot=dragX*0.07;
    card.style.transition='none';
    card.style.transform=`translateX(${dragX}px) rotate(${rot}deg)`;
    // show the peek word on the side being dragged toward
    const thr=40;
    document.getElementById('peek-left').style.opacity  = dragX < -thr ? Math.min((-dragX-thr)/60,1) : 0;
    document.getElementById('peek-right').style.opacity = dragX >  thr ? Math.min((dragX-thr)/60,1)  : 0;
  }

  function onUp(){
    if(!dragging) return;
    dragging=false;
    document.removeEventListener('mousemove',mm);
    document.removeEventListener('mouseup',mu);
    document.removeEventListener('touchmove',tm);
    document.removeEventListener('touchend',tu);

    const THRESHOLD=90;
    if(dragX > THRESHOLD){
      // swiped right → chose right choice (index 1)
      resolveAnswer(choices[1].word===deck[idx].word, 1);
    } else if(dragX < -THRESHOLD){
      // swiped left → chose left choice (index 0)
      resolveAnswer(choices[0].word===deck[idx].word, 0);
    } else {
      // snap back
      card.style.transition='transform .3s ease';
      card.style.transform='translateX(0) rotate(0)';
      document.getElementById('peek-left').style.opacity=0;
      document.getElementById('peek-right').style.opacity=0;
    }
    dragX=0;
  }

  const mm=e=>onMove(e.clientX);
  const mu=()=>onUp();
  const tm=e=>{e.preventDefault();onMove(e.touches[0].clientX);};
  const tu=()=>onUp();

  document.addEventListener('mousemove',mm);
  document.addEventListener('mouseup',mu);
  document.addEventListener('touchmove',tm,{passive:false});
  document.addEventListener('touchend',tu);
}

/* ── AUDIO ── */
function playTone(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(type==='correct'){
      [[523,.0],[659,.12],[784,.24]].forEach(([freq,delay])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=freq;o.type='sine';
        g.gain.setValueAtTime(.28,ctx.currentTime+delay);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+delay+.28);
        o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+.32);
      });
    } else {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=200;o.type='sawtooth';
      g.gain.setValueAtTime(.28,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.38);
      o.start();o.stop(ctx.currentTime+.42);
    }
  }catch(e){}
}

/* ── CELEBRATE ── */
function celebrate(){
  const box=document.getElementById('cel');
  for(let i=0;i<20;i++){
    const el=document.createElement('span');
    el.className='sp';
    el.textContent=STARS[Math.floor(Math.random()*STARS.length)];
    el.style.left=Math.random()*100+'vw';
    el.style.fontSize=(0.9+Math.random()*1.1)+'rem';
    el.style.animationDuration=(1+Math.random()*1.4)+'s';
    el.style.animationDelay=(Math.random()*.3)+'s';
    box.appendChild(el);
    setTimeout(()=>el.remove(),2800);
  }
}

/* ── FLASH ── */
function initFlash(){fdeck=shuffle([...WORDS]);fi=0;flipped=false;renderFlash();}

function renderFlash(){
  const item=fdeck[fi];flipped=false;
  document.getElementById('fi').classList.remove('flipped');
  document.getElementById('fw-front').textContent=item.word.toUpperCase();
  document.getElementById('fw-back').textContent=item.word.toUpperCase();
  document.getElementById('ffam').textContent=`-${item.family.toUpperCase()} family`;
  document.getElementById('fillus').innerHTML=SVG[item.word]||'';
  document.getElementById('flctr').textContent=`${fi+1} / ${fdeck.length}`;
}

function doFlip(){flipped=!flipped;document.getElementById('fi').classList.toggle('flipped',flipped);}
function fNav(d){fi=(fi+d+fdeck.length)%fdeck.length;renderFlash();}

/* ── HUD ── */
function updateHUD(){
  document.getElementById('nc').textContent=nC;
  document.getElementById('nw').textContent=nW;
  document.getElementById('nd').textContent=idx;
  document.getElementById('prog').style.width=(deck.length?(idx/deck.length)*100:0)+'%';
}

/* ── COMPLETION ── */
function showComp(){
  document.getElementById('swipe-area').style.display='none';
  document.getElementById('comp').classList.add('on');
  document.getElementById('cstats').textContent=`✅ ${nC} correct  ❌ ${nW} wrong — all ${deck.length} words done!`;
  celebrate();setTimeout(celebrate,400);setTimeout(celebrate,800);
}

function restart(){
  document.getElementById('comp').classList.remove('on');
  document.getElementById('swipe-area').style.display=mode==='swipe'?'':'none';
  document.getElementById('flash-area').style.display=mode==='flash'?'':'none';
  init();
}

/* ── MODE ── */
function setMode(m){
  mode=m;
  document.getElementById('ts').classList.toggle('on',m==='swipe');
  document.getElementById('tf').classList.toggle('on',m==='flash');
  document.getElementById('score-row').style.display=m==='swipe'?'flex':'none';
  document.getElementById('comp').classList.remove('on');
  document.getElementById('swipe-area').style.display=m==='swipe'?'':'none';
  document.getElementById('flash-area').style.display=m==='flash'?'':'none';
  init();
}

init();
</script>
