<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plural Rules — Learn English</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --teal:#0D9488;--rose:#F43F5E;--blue:#3B82F6;
  --amber:#F59E0B;--indigo:#6366F1;--lime:#65A30D;
  --orange:#EA580C;--pink:#DB2777;--cyan:#0891B2;
  --bg:#F0FDF9;--text:#1E293B;--muted:#64748B;--card:#fff;
}
body{font-family:'Nunito',sans-serif;font-weight:800;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
#rainbow-bar{position:fixed;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#0D9488,#3B82F6,#6366F1,#F43F5E,#F59E0B,#65A30D,#0D9488);z-index:1000;}
#bubble-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#app{position:relative;z-index:1;padding-top:12px;}

/* ── SCREENS ── */
.screen{display:none;max-width:520px;margin:0 auto;padding:12px 14px 80px;}
.screen.active{display:block;}

/* ── HOME ── */
#home-screen{padding-top:32px;text-align:center;}
.home-title{font-family:'Fredoka One',cursive;font-size:2.3rem;color:var(--teal);line-height:1.1;margin-bottom:4px;}
.home-sub{font-size:.88rem;color:var(--muted);margin-bottom:22px;}

.cat-list{display:flex;flex-direction:column;gap:10px;max-width:400px;margin:0 auto 24px;}
.cat-btn{border:none;border-radius:18px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.11);transition:transform .18s,box-shadow .18s;width:100%;text-align:left;color:#fff;}
.cat-btn:hover{transform:translateY(-3px);box-shadow:0 8px 26px rgba(0,0,0,.17);}
.cat-icon{font-size:1.9rem;flex-shrink:0;}
.cat-name{font-family:'Fredoka One',cursive;font-size:1.1rem;display:block;}
.cat-rule{font-size:.75rem;opacity:.88;}
.cat-count{margin-left:auto;font-family:'Fredoka One',cursive;font-size:.85rem;background:rgba(255,255,255,.25);border-radius:50px;padding:3px 10px;flex-shrink:0;}
.cat-btn.selected{outline:4px solid rgba(255,255,255,.9);transform:translateY(-2px);box-shadow:0 8px 26px rgba(0,0,0,.22);}
.cat-btn.selected .cat-count{background:rgba(255,255,255,.5);}

.fill-home-btn{border:none;border-radius:18px;padding:16px 24px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.11);transition:transform .18s;width:100%;max-width:400px;margin:0 auto;text-align:left;color:#fff;background:var(--amber);}
.fill-home-btn:hover{transform:translateY(-2px);}

/* ── BOTTOM NAV ── */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #e2e8f0;z-index:500;height:60px;}
#bottom-nav.visible{display:flex;}
.bnav-btn{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;color:var(--muted);padding:4px 2px;transition:all .18s;}
.bnav-btn .bn-icon{font-size:17px;line-height:1;}

/* ── BACK BAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.back-btn{background:none;border:2px solid #cbd5e1;border-radius:50px;padding:6px 14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.84rem;color:var(--muted);cursor:pointer;}
.back-btn:hover{border-color:var(--text);color:var(--text);}
.screen-title{font-family:'Fredoka One',cursive;font-size:1rem;}
.prog-label{font-size:.82rem;color:var(--muted);}

/* ── WORD PAIR CARD ── */
.pair-intro{background:rgba(255,255,255,.92);border-radius:18px;padding:12px 16px;margin-bottom:14px;box-shadow:0 3px 14px rgba(0,0,0,.08);border-top:5px solid var(--teal);text-align:center;}
.pair-intro .rule-badge{display:inline-block;font-family:'Fredoka One',cursive;font-size:.88rem;padding:4px 14px;border-radius:50px;color:#fff;margin-bottom:6px;}
.pair-intro .rule-desc{font-size:.82rem;color:var(--muted);}

.pair-card{background:rgba(255,255,255,.94);border-radius:22px;box-shadow:0 5px 24px rgba(0,0,0,.10);overflow:hidden;margin-bottom:14px;}
.pair-inner{display:grid;grid-template-columns:1fr 1fr;min-height:340px;}

/* desktop side-by-side, mobile stacked */
@media(max-width:480px){
  .pair-inner{grid-template-columns:1fr;min-height:auto;}
  .pair-side.plural-side{border-top:3px solid rgba(255,255,255,.4);border-left:none!important;}
}

.pair-side{display:flex;flex-direction:column;align-items:center;padding:18px 14px;text-align:center;}
.pair-side.singular-side{background:rgba(255,255,255,.0);}
.pair-side.plural-side{border-left:2px dashed rgba(255,255,255,.4);}
.plural-side-hidden{opacity:0;transform:translateX(18px);pointer-events:none;}
.plural-side-visible{opacity:1;transform:translateX(0);transition:opacity .4s ease, transform .4s ease;}
@media(max-width:480px){
  .plural-side-hidden{opacity:0;transform:translateY(14px);}
  .plural-side-visible{opacity:1;transform:translateY(0);transition:opacity .4s ease, transform .4s ease;}
}

.side-label{font-size:.7rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;opacity:.6;margin-bottom:8px;}
.pair-word{font-family:'Fredoka One',cursive;font-size:2rem;margin-bottom:10px;line-height:1;}
.pair-img-wrap{width:100%;max-width:200px;aspect-ratio:1;margin:0 auto 10px;border-radius:16px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.12);}
.pair-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.pair-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4.5rem;}
.pair-sentence{font-size:.82rem;color:var(--muted);line-height:1.55;font-weight:800;}
.pair-sentence strong{color:var(--text);}

.pair-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 18px;background:rgba(0,0,0,.03);border-top:1px solid rgba(0,0,0,.06);}
.nav-pill{border:2px solid #ddd;border-radius:50px;padding:7px 20px;background:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;color:var(--muted);cursor:pointer;transition:all .18s;}
.nav-pill:hover{border-color:var(--teal);color:var(--teal);}
.nav-pill.hidden{visibility:hidden;}
.pair-counter{font-size:.82rem;color:var(--muted);}

.dot-row{display:flex;gap:6px;justify-content:center;padding:10px 0 4px;flex-wrap:wrap;}
.dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1;transition:all .3s;}
.dot.active{transform:scale(1.35);}
.dot.done{opacity:.5;}

.finish-card{background:#fff;border-radius:24px;box-shadow:0 6px 28px rgba(0,0,0,.10);text-align:center;padding:34px 22px;animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.trophy{font-size:3.4rem;display:inline-block;animation:bounce 1s infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.finish-title{font-family:'Fredoka One',cursive;font-size:1.6rem;margin:8px 0 4px;color:var(--teal);}
.finish-sub{color:var(--muted);font-size:.88rem;margin-bottom:18px;}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.pill-btn{border:none;border-radius:50px;padding:11px 24px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.93rem;cursor:pointer;transition:transform .15s;color:#fff;}
.pill-btn:hover{transform:scale(1.05);}
.btn-green{background:var(--teal);}
.btn-orange{background:var(--amber);}
.btn-indigo{background:var(--indigo);}

/* ── FILL ── */
#fill-screen{padding-top:12px;}
.fill-card{background:rgba(255,255,255,.94);border-radius:22px;box-shadow:0 5px 22px rgba(0,0,0,.09);padding:22px 18px;text-align:center;border-top:5px solid var(--amber);}
.fill-tag{display:inline-block;font-size:.72rem;font-family:'Fredoka One',cursive;padding:3px 12px;border-radius:50px;color:#fff;margin-bottom:10px;}
.fill-base{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--muted);opacity:.7;}
.fill-sentence{font-size:1.05rem;line-height:1.75;margin-bottom:14px;}
.fill-blank{display:inline-block;border-bottom:3px solid var(--blue);min-width:82px;padding:0 6px;font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--blue);transition:all .3s;}
.fill-blank.correct{color:var(--teal);border-color:var(--teal);}
.fill-choices{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px;}
.fill-choice{border:2px solid transparent;border-radius:50px;padding:9px 18px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.9rem;background:rgba(255,255,255,.9);box-shadow:0 3px 10px rgba(0,0,0,.09);cursor:pointer;color:var(--text);transition:all .2s;}
.fill-choice:hover:not(:disabled){border-color:var(--blue);}
.fill-choice.correct-c{background:var(--teal);color:#fff;border-color:var(--teal);}
.fill-choice.wrong-c{animation:shake .4s;border-color:var(--rose);}
.fill-choice:disabled{opacity:.6;cursor:default;}
.fill-fb{min-height:18px;font-size:.86rem;margin-bottom:8px;}
.fill-fb.ok{color:var(--teal);}
.fill-fb.no{color:var(--rose);}
.fill-next{display:none;background:var(--teal);color:#fff;border:none;border-radius:50px;padding:11px 30px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.93rem;cursor:pointer;transition:transform .15s;margin-top:2px;}
.fill-next.show{display:inline-block;}
.fill-next:hover{transform:scale(1.05);}
.fill-hint{margin-top:10px;font-size:.78rem;color:var(--muted);background:rgba(0,0,0,.04);border-radius:10px;padding:7px 12px;}

@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
@keyframes pulse{0%,100%{opacity:.7;}50%{opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

#footer{text-align:center;padding:18px 16px 10px;font-size:.74rem;color:var(--muted);position:relative;z-index:1;}
</style>
</head>
<body>
<div id="rainbow-bar"></div>
<canvas id="bubble-canvas"></canvas>
<div id="app">

<!-- ═══ HOME ═══ -->
<div id="home-screen" class="screen active">
  <div class="home-title">📚 Plural Rules</div>
  <div class="home-sub">Choose a category to study word pairs</div>

  <div class="cat-list" id="cat-list"></div>

  <div style="max-width:400px;margin:0 auto 8px;">
    <button class="fill-home-btn" onclick="showFillCats()">
      <span class="cat-icon">✏️</span>
      <span>
        <span class="cat-name">Fill in the Blank</span>
        <span class="cat-rule">Choose a category to practise!</span>
      </span>
    </button>
  </div>

  <div id="footer">Pang made with ❤️ for kids learning English</div>
</div>

<!-- ═══ BOTTOM NAV ═══ -->
<div id="bottom-nav">
  <button class="bnav-btn" id="bn-home" onclick="goHome()"><span class="bn-icon">🏠</span>Home</button>
  <button class="bnav-btn" id="bn-fill" onclick="showFillCats()"><span class="bn-icon">✏️</span>Fill</button>
</div>

<!-- ═══ WORD PAIR SCREEN ═══ -->
<div id="pair-screen" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="screen-title" id="pair-cat-title"></div>
    <button class="back-btn" id="pair-fill-btn" onclick="startFillFromCat()" style="border-color:var(--amber);color:var(--amber);">✏️ Fill</button>
  </div>
  <div class="prog-label" style="text-align:right;margin-bottom:8px;" id="pair-prog"></div>
  <div id="pair-intro"></div>
  <div id="pair-main"></div>
  <div class="dot-row" id="pair-dots"></div>
  <div id="pair-finish" style="display:none;margin-top:10px;">
    <div class="finish-card">
      <div class="trophy">🏆</div>
      <div class="finish-title">Great Job!</div>
      <div class="finish-sub">You studied all the word pairs!</div>
      <div class="btn-row">
        <button class="pill-btn btn-orange" onclick="restartPairs()">Again</button>
        <button class="pill-btn btn-indigo" onclick="startFillFromCat()">✏️ Fill in Blank</button>
        <button class="pill-btn btn-green" onclick="goHome()">Menu</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ FILL CATEGORY SCREEN ═══ -->
<div id="fill-cat-screen" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="screen-title" style="color:var(--amber);">✏️ Fill in the Blank</div>
    <div></div>
  </div>
  <div style="font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:6px;">Select one or more categories:</div>
  <div class="cat-list" id="fill-cat-list"></div>
  <div style="max-width:400px;margin:0 auto 8px;">
    <button id="fill-start-btn" onclick="startFillMulti()" style="display:none;border:none;border-radius:18px;padding:15px 20px;width:100%;background:var(--amber);color:#fff;font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.12);transition:transform .18s;">
      Start Fill in the Blank →
    </button>
  </div>
</div>

<!-- ═══ FILL SCREEN ═══ -->
<div id="fill-screen" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="showFillCats()">← Back</button>
    <div class="screen-title" style="color:var(--amber);" id="fill-screen-title">✏️ Fill in the Blank</div>
    <div class="prog-label" id="fill-prog"></div>
  </div>
  <div id="fill-main"></div>
  <div id="fill-finish" style="display:none;margin-top:10px;">
    <div class="finish-card">
      <div class="trophy">🎉</div>
      <div class="finish-title">Amazing!</div>
      <div class="finish-sub" id="fill-finish-sub"></div>
      <div class="btn-row">
        <button class="pill-btn btn-orange" onclick="restartFill()">Play Again</button>
        <button class="pill-btn btn-indigo" onclick="showFillCats()">Categories</button>
        <button class="pill-btn btn-green" onclick="goHome()">Menu</button>
      </div>
    </div>
  </div>
</div>

</div><!-- #app -->

<script>
// ══════════════════════════════════════
// CATEGORIES & DATA
// ══════════════════════════════════════
const CATEGORIES = [
  {
    id:'cat1', name:'Change Form Completely', rule:'Irregular — whole word changes!',
    icon:'🔄', color:'#0D9488',
    words:[
      {id:'man',    s:'man',    p:'men',      e:'👨', easy:['There is one man.','There are four men.'],           mid:['The man is carrying a bag.','Four men are playing tennis.'],       fill:'There are four _____ playing tennis.',      fa:'men',      fo:['mans','manes']},
      {id:'woman',  s:'woman',  p:'women',    e:'👩', easy:['There is one woman.','There are three women.'],       mid:['The woman is reading a book.','Three women are shopping together.'], fill:'Three _____ are shopping together.',         fa:'women',    fo:['womans','wimens']},
      {id:'child',  s:'child',  p:'children', e:'🧒', easy:['One child is sleeping.','Two children are running.'], mid:['The child is drawing a picture.','The children are playing in the park.'], fill:'The _____ are playing in the park.',     fa:'children', fo:['childs','childrens']},
      {id:'person', s:'person', p:'people',   e:'🧑', easy:['One person is waiting.','Five people are eating.'],   mid:['The person is holding an umbrella.','Many people are watching the football game.'], fill:'Many _____ are watching the game.', fa:'people',   fo:['persons','peoples']},
      {id:'mouse',  s:'mouse',  p:'mice',     e:'🐭', easy:['I see one mouse.','I see two mice.'],                 mid:['The mouse is eating cheese.','The mice are hiding under the table.'], fill:'The _____ are hiding under the table.',  fa:'mice',     fo:['mouses','mices']},
      {id:'louse',  s:'louse',  p:'lice',     e:'🦟', easy:['The dog has one louse.','The dog has many lice.'],   mid:['The louse is in the dog\'s fur.','The lice are making the dog itchy.'], fill:'The _____ are making the dog itchy.',   fa:'lice',     fo:['louses','lices']},
      {id:'tooth',  s:'tooth',  p:'teeth',    e:'🦷', easy:['I have one tooth.','Sharks have many teeth.'],        mid:['The tooth is hurting.','The boy brushes his teeth every day.'],        fill:'The boy brushes his _____ every day.',      fa:'teeth',    fo:['tooths','toothes']},
      {id:'foot',   s:'foot',   p:'feet',     e:'🦶', easy:['My foot hurts today.','The baby has small feet.'],        mid:['My foot hurts today.','The football players are running on their feet.'], fill:'The football players are running on their _____ .',                    fa:'feet',     fo:['foots','feets']},
      {id:'goose',  s:'goose',  p:'geese',    e:'🦢', easy:['There is one goose.','There are six geese.'],         mid:['The goose is swimming in the lake.','The geese are walking across the road.'], fill:'The _____ are walking across the road.', fa:'geese',  fo:['gooses','goosees']},
      {id:'ox',     s:'ox',     p:'oxen',     e:'🐂', easy:['There is one ox.','The farmers have two oxen.'],      mid:['The ox is pulling a cart.','The oxen are working on the farm.'],      fill:'The _____ are working on the farm.',         fa:'oxen',     fo:['oxs','oxes']},
    ]
  },
  {
    id:'cat2', name:'No Change', rule:'Singular = Plural — same word!',
    icon:'🟰', color:'#3B82F6',
    words:[
      {id:'sheep', s:'sheep', p:'sheep', e:'🐑', easy:['There is one sheep.','There are five sheep.'], mid:['The sheep is eating grass.','The sheep are sleeping near the tree.'], fill:'The _____ are sleeping near the tree.', fa:'sheep', fo:['sheeps','sheepes']},
      {id:'deer',  s:'deer',  p:'deer',  e:'🦌', easy:['I see one deer.','I see three deer.'],         mid:['The deer is drinking water.','The deer are running in the forest.'],  fill:'The _____ are running in the forest.',  fa:'deer',  fo:['deers','deeres']},
      {id:'fish',  s:'fish',  p:'fish',  e:'🐟', easy:['There is one fish.','There are many fish.'],   mid:['The fish is swimming fast.','The fish are swimming near the rocks.'], fill:'The _____ are swimming near the rocks.', fa:'fish',  fo:['fishs','fishes']},
    ]
  },
  {
    id:'cat3a', name:'Consonant + y → -ies', rule:'Drop the y, add -ies',
    icon:'🔤', color:'#6366F1',
    words:[
      {id:'baby',    s:'baby',    p:'babies',   e:'👶', easy:['The baby is crying.','The babies are sleeping.'],         mid:['The baby is wearing a yellow hat.','The babies are playing with toys.'],   fill:'The _____ are playing with toys.',          fa:'babies',   fo:['babys','babyes']},
      {id:'city',    s:'city',    p:'cities',   e:'🏙️', easy:['Bangkok is a city.','These are big cities.'],              mid:['The city is very crowded.','Many cities have tall buildings.'],           fill:'Many _____ have tall buildings.',            fa:'cities',   fo:['citys','cityes']},
      {id:'family',  s:'family',  p:'families', e:'👨‍👩‍👧‍👦', easy:['I have a big family.','Two families are eating dinner.'], mid:['My family likes camping.','The families are watching the school show.'], fill:'The _____ are watching the school show.',   fa:'families', fo:['familys','familyes']},
      {id:'story',   s:'story',   p:'stories',  e:'📖', easy:['I like this story.','She reads many stories.'],            mid:['The story is very funny.','The children are listening to stories.'],      fill:'The children are listening to _____.',      fa:'stories',  fo:['storys','storyes']},
      {id:'country', s:'country', p:'countries',e:'🌍', easy:['Thailand is a country.','We learned about many countries.'],mid:['The country is very beautiful.','The countries are working together.'],  fill:'The _____ are working together.',           fa:'countries',fo:['countrys','countyes']},
      {id:'party',   s:'party',   p:'parties',  e:'🎉', easy:['The party is fun.','We went to two parties.'],             mid:['The party starts at six o\'clock.','The children are enjoying the parties.'],fill:'The children are enjoying the _____.',  fa:'parties',  fo:['partys','partyes']},
    ]
  },
  {
    id:'cat3b', name:'Vowel + y → just add -s', rule:'Keep the y, just add -s',
    icon:'➕', color:'#0891B2',
    words:[
      {id:'toy',    s:'toy',    p:'toys',    e:'🧸', easy:['This is my toy.','The toys are on the floor.'],   mid:['The toy is very expensive.','The children are sharing their toys.'],     fill:'The children are sharing their _____ .', fa:'toys',    fo:['toies','toyes']},
      {id:'monkey', s:'monkey', p:'monkeys', e:'🐒', easy:['I see one monkey.','The monkeys are jumping.'],  mid:['The monkey is eating a banana.','The monkeys are climbing the trees.'],  fill:'The _____ are climbing the trees.',        fa:'monkeys', fo:['monkies','monkeyes']},
      {id:'key',    s:'key',    p:'keys',    e:'🔑', easy:['This is my key.','The keys are on the table.'],  mid:['The key is inside the bag.','The teachers are carrying their keys.'],    fill:'The teachers are carrying their _____ .', fa:'keys',    fo:['keies','keyes']},
      {id:'boy',    s:'boy',    p:'boys',    e:'👦', easy:['The boy is happy.','The boys are running.'],      mid:['The boy is riding a bicycle.','The boys are playing football together.'], fill:'The _____ are playing football together.', fa:'boys',    fo:['boies','boyes']},
    ]
  },
  {
    id:'cat4', name:'-f / -fe → -ves (or -s!)', rule:'Usually change f or fe to -ves',
    icon:'🍂', color:'#EA580C',
    words:[

// STATE

let currentCat = null;

// ══════════════════════════════════════

const shuffle = a => {
  const r=[...a];
  for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}
  return r;
};

// NAVIGATION
// ══════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  document.getElementById('bottom-nav').classList.add('visible');
}
function goHome(){
  showScreen('home-screen');
  setActiveNav('bn-home','#1E293B');
}
function setActiveNav(id, color){
  ['bn-home','bn-fill'].forEach(b=>{
    const el=document.getElementById(b);
    if(el){el.style.background='';el.style.color='var(--muted)';}
  });
  const el=document.getElementById(id);
  if(el){el.style.background=color;el.style.color='#fff';}
}

function buildHome(){
  const list=document.getElementById('cat-list');
  list.innerHTML='';
  CATEGORIES.forEach((cat,i)=>{
    const btn=document.createElement('button');
    btn.className='cat-btn';
    btn.style.background=cat.color;
    btn.innerHTML=`
      <span class="cat-icon">${cat.icon}</span>
      <span>
        <span class="cat-name">${cat.name}</span>
        <span class="cat-rule">${cat.rule}</span>
      </span>
      <span class="cat-count">${cat.words.length} words</span>
    `;
    btn.addEventListener('click',()=>startCategory(cat));
    list.appendChild(btn);
  });
}

// WORD PAIR VIEW
// ══════════════════════════════════════
function startCategory(cat){
  currentCat=cat; pairIdx=0; pairRevealed=false;
  document.getElementById('pair-cat-title').textContent=cat.icon+' '+cat.name;
  document.getElementById('pair-cat-title').style.color=cat.color;
  document.getElementById('pair-finish').style.display='none';
  document.getElementById('pair-main').style.display='block';
  showScreen('pair-screen');
  setActiveNav('bn-home','#1E293B');
  buildIntro(cat);
  buildDots();
  renderPair();
}
function buildIntro(cat){
  const el=document.getElementById('pair-intro');
  const exceptionNote = cat.id==='cat4'
    ? `<div style="margin-top:8px;background:#FEF3C7;border-radius:10px;padding:7px 12px;font-size:.8rem;color:#92400E;font-weight:800;">⚠️ Exceptions: <strong>roof→roofs, chef→chefs, belief→beliefs</strong> just add <strong>-s</strong>!</div>`
    : '';
  el.innerHTML=`<div class="pair-intro">
    <span class="rule-badge" style="background:${cat.color};">${cat.rule}</span>
    <div class="rule-desc">See the singular → tap the card to reveal the plural!</div>
    ${exceptionNote}
  </div>`;
}
function buildDots(){
  const dr=document.getElementById('pair-dots'); dr.innerHTML='';
  currentCat.words.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.style.background=i===0?currentCat.color:'#cbd5e1';
    d.id='pd'+i; dr.appendChild(d);
  });
}
function updateDots(){
  currentCat.words.forEach((_,i)=>{
    const d=document.getElementById('pd'+i);
    if(!d) return;
    if(i<pairIdx){d.className='dot done';d.style.background=currentCat.color;d.style.opacity='.4';}
    else if(i===pairIdx){d.className='dot active';d.style.background=currentCat.color;d.style.opacity='1';}
    else{d.className='dot';d.style.background='#cbd5e1';d.style.opacity='1';}
  });
}

function makeImgEl(src, emoji){
  const wrap=document.createElement('div');
  wrap.className='pair-img-wrap';
  const img=document.createElement('img');
  img.src=src; img.alt='';
  img.onerror=function(){
    const ph=document.createElement('div');
    ph.className='pair-img-ph';
    ph.textContent=emoji;
    this.replaceWith(ph);
  };
  wrap.appendChild(img);
  return wrap;
}

function renderPair(){
  const w=currentCat.words[pairIdx];
  const col=currentCat.color;
  pairRevealed=false;
  document.getElementById('pair-prog').textContent=(pairIdx+1)+' / '+currentCat.words.length;
  updateDots();

  const container=document.getElementById('pair-main');
  container.innerHTML='';

  const card=document.createElement('div');
  card.className='pair-card';
  card.style.borderTop=`5px solid ${col}`;
  card.style.cursor='pointer';
  card.title='Tap to reveal plural';
  card.addEventListener('click', revealPlural);

  const inner=document.createElement('div');
  inner.className='pair-inner';

  // ── SINGULAR SIDE ──
  const singularSide=document.createElement('div');
  singularSide.className='pair-side singular-side';
  singularSide.style.background=col+'18';
  const ruleLabel = w.exception
    ? `<div style="font-size:.75rem;background:#FEF3C7;color:#92400E;border-radius:50px;padding:4px 12px;margin-bottom:6px;font-family:'Fredoka One',cursive;border:2px solid #F59E0B;">⚠️ Exception — just add -s!</div>`
    : `<div style="font-size:.7rem;background:${col}22;color:${col};border-radius:50px;padding:3px 10px;margin-bottom:6px;font-family:'Fredoka One',cursive;">${currentCat.rule}</div>`;
  singularSide.innerHTML=`<div class="side-label" style="color:${col};">Singular (one)</div>
    <div class="pair-word" style="color:${col};">${w.s}</div>
    ${ruleLabel}`;
  singularSide.appendChild(makeImgEl(w.id+'.jpg', w.e));
  const sEasy=document.createElement('div');
  sEasy.className='pair-sentence';
  sEasy.innerHTML=`<strong>${w.easy[0]}</strong><br>${w.mid[0]}`;
  singularSide.appendChild(sEasy);

  // ── PLURAL SIDE (hidden, same grid cell — appears in place) ──
  const pluralSide=document.createElement('div');
  pluralSide.className='pair-side plural-side plural-side-hidden';
  pluralSide.id='plural-side';
  pluralSide.style.background=col+'2a';
  pluralSide.style.borderLeft=`2px dashed ${col}55`;
  pluralSide.innerHTML=`<div class="side-label" style="color:${col};">Plural (many)</div>
    <div class="pair-word" style="color:${col};">${w.p}</div>`;
  pluralSide.appendChild(makeImgEl(w.id+'1.jpg', w.e));
  const pEasy=document.createElement('div');
  pEasy.className='pair-sentence';
  pEasy.innerHTML=`<strong>${w.easy[1]}</strong><br>${w.mid[1]}`;
  pluralSide.appendChild(pEasy);

  inner.appendChild(singularSide);
  inner.appendChild(pluralSide);
  card.appendChild(inner);

  // bottom bar — always visible, holds ← and tap hint / Next →
  const bottomBar=document.createElement('div');
  bottomBar.style.cssText='display:flex;align-items:stretch;border-top:1px solid rgba(0,0,0,.06);min-height:48px;';

  // ← prev button — always visible from word 2+
  const prevBtn=document.createElement('button');
  prevBtn.className='nav-pill'+(pairIdx===0?' hidden':'');
  prevBtn.style.cssText='margin:0;border-radius:0;border:none;border-right:1px solid rgba(0,0,0,.07);padding:0 18px;flex-shrink:0;font-size:1.1rem;background:#fff;color:var(--muted);cursor:pointer;';
  prevBtn.textContent='←';
  prevBtn.addEventListener('click',(e)=>{e.stopPropagation();if(pairIdx>0){pairIdx--;renderPair();}});
  bottomBar.appendChild(prevBtn);

  // tap hint (shown before reveal)
  const tapHint=document.createElement('div');
  tapHint.id='tap-hint';
  tapHint.style.cssText=`flex:1;background:${col};color:#fff;text-align:center;padding:0 14px;font-family:'Fredoka One',cursive;font-size:.95rem;animation:pulse 1.8s infinite;display:flex;align-items:center;justify-content:center;`;
  tapHint.textContent='Tap to reveal the plural →';
  bottomBar.appendChild(tapHint);

  // nav row (hidden until revealed)
  const navRow=document.createElement('div');
  navRow.className='pair-nav';
  navRow.id='pair-nav-row';
  navRow.style.cssText='display:none;flex:1;align-items:center;justify-content:center;gap:16px;padding:0 14px;';

  const counter=document.createElement('div');
  counter.className='pair-counter';
  counter.textContent=(pairIdx+1)+' of '+currentCat.words.length;

  const nextBtn=document.createElement('button');
  nextBtn.className='nav-pill';
  nextBtn.style.borderColor=col;
  nextBtn.style.color=col;
  nextBtn.textContent=pairIdx===currentCat.words.length-1?'Finish ✓':'Next →';
  nextBtn.addEventListener('click',(e)=>{
    e.stopPropagation();
    pairIdx++;
    if(pairIdx>=currentCat.words.length){
      container.style.display='none';
      document.getElementById('pair-dots').style.display='none';
      document.getElementById('pair-intro').style.display='none';
      document.getElementById('pair-finish').style.display='block';
    } else { renderPair(); }
  });

  navRow.appendChild(counter);
  navRow.appendChild(nextBtn);
  bottomBar.appendChild(navRow);
  card.appendChild(bottomBar);
  container.appendChild(card);
}

function revealPlural(){
  if(pairRevealed) return;
  pairRevealed=true;
  const hint=document.getElementById('tap-hint');
  if(hint) hint.style.display='none';
  const ps=document.getElementById('plural-side');
  if(ps){ ps.classList.remove('plural-side-hidden'); ps.classList.add('plural-side-visible'); ps.style.pointerEvents='auto'; }
  const nav=document.getElementById('pair-nav-row');
  if(nav) nav.style.display='flex';
}

function restartPairs(){
  pairIdx=0; pairRevealed=false;
  document.getElementById('pair-main').style.display='block';
  document.getElementById('pair-dots').style.display='flex';
  document.getElementById('pair-intro').style.display='block';
  document.getElementById('pair-finish').style.display='none';
  buildDots();
  renderPair();
}

// FILL IN THE BLANK — by category (multi-select)
// ══════════════════════════════════════
let fillCat = null;         // single cat (from pair screen)
let fillSelectedIds = new Set(); // multi-select (from home fill screen)

function showFillCats(){
  fillSelectedIds.clear();
  const list=document.getElementById('fill-cat-list');
  list.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-btn';
    btn.style.background=cat.color;
    btn.dataset.catId=cat.id;
    btn.innerHTML=`
      <span class="cat-icon">${cat.icon}</span>
      <span>
        <span class="cat-name">${cat.name}</span>
        <span class="cat-rule">${cat.rule}</span>
      </span>
      <span class="cat-count">${cat.words.length} Q</span>
    `;
    btn.addEventListener('click',()=>{
      if(fillSelectedIds.has(cat.id)){
        fillSelectedIds.delete(cat.id);
        btn.classList.remove('selected');
      } else {
        fillSelectedIds.add(cat.id);
        btn.classList.add('selected');
      }
      const startBtn=document.getElementById('fill-start-btn');
      startBtn.style.display=fillSelectedIds.size>0?'block':'none';
      const count=[...fillSelectedIds].reduce((n,id)=>{
        const c=CATEGORIES.find(x=>x.id===id); return n+(c?c.words.length:0);
      },0);
      startBtn.textContent=`Start — ${count} question${count!==1?'s':''} →`;
    });
    list.appendChild(btn);
  });
  document.getElementById('fill-start-btn').style.display='none';
  showScreen('fill-cat-screen');
  setActiveNav('bn-fill','var(--amber)');
}

function startFillMulti(){
  // gather words from all selected categories
  const selectedCats=CATEGORIES.filter(c=>fillSelectedIds.has(c.id));
  if(!selectedCats.length) return;
  fillCat=null;
  const allWords=[];
  selectedCats.forEach(cat=>{
    cat.words.forEach(w=>allWords.push({...w, catColor:cat.color, catName:cat.name, catRule:cat.rule}));
  });
  fillList=shuffle(allWords);
  fillIdx=0; fillScore=0; fillAnswered=false;
  const label=selectedCats.length===1?selectedCats[0].name:'Mixed ('+selectedCats.length+' categories)';
  document.getElementById('fill-screen-title').textContent='✏️ '+label;
  document.getElementById('fill-finish').style.display='none';
  document.getElementById('fill-main').style.display='block';
  showScreen('fill-screen');
  renderFill();
}

// called from pair screen topbar and finish screen
function startFillFromCat(){
  if(!currentCat) return;
  fillCat=currentCat;
  fillList=shuffle(currentCat.words.map(w=>({...w, catColor:currentCat.color, catName:currentCat.name, catRule:currentCat.rule})));
  fillIdx=0; fillScore=0; fillAnswered=false;
  document.getElementById('fill-screen-title').textContent='✏️ '+currentCat.name;
  document.getElementById('fill-finish').style.display='none';
  document.getElementById('fill-main').style.display='block';
  showScreen('fill-screen');
  renderFill();
}

function restartFill(){
  if(fillCat){
    // single category restart
    fillList=shuffle(fillCat.words.map(w=>({...w, catColor:fillCat.color, catName:fillCat.name, catRule:fillCat.rule})));
  } else {
    // multi-select restart — re-gather from selected ids
    const selectedCats=CATEGORIES.filter(c=>fillSelectedIds.has(c.id));
    const allWords=[];
    selectedCats.forEach(cat=>{
      cat.words.forEach(w=>allWords.push({...w, catColor:cat.color, catName:cat.name, catRule:cat.rule}));
    });
    fillList=shuffle(allWords);
  }
  fillIdx=0; fillScore=0; fillAnswered=false;
  document.getElementById('fill-finish').style.display='none';
  document.getElementById('fill-main').style.display='block';
  renderFill();
}

function renderFill(){
  document.getElementById('fill-prog').textContent=(fillIdx+1)+' / '+fillList.length;
  const a=fillList[fillIdx]; fillAnswered=false;
  const choices=shuffle([a.fa,...a.fo]);
  const sentHTML=a.fill.replace('_____',`<span class="fill-blank" id="fill-blank">?</span> <span class="fill-base">(${a.s})</span>`);
  document.getElementById('fill-main').innerHTML=`
    <div class="fill-card">
      <span class="fill-tag" style="background:${a.catColor};">${a.catName}</span>
      <div style="font-size:.8rem;color:var(--muted);margin-bottom:14px;font-weight:800;">Make the word in brackets plural:</div>
      <div class="fill-sentence">${sentHTML}</div>
      <div class="fill-choices">
        ${choices.map(c=>`<button class="fill-choice" onclick="fillCheck(this,${JSON.stringify(c)},${JSON.stringify(a.fa)},${JSON.stringify(a.s)},${JSON.stringify(a.p)},${JSON.stringify(a.catColor)},${JSON.stringify(a.catRule)})">${c}</button>`).join('')}
      </div>
      <div class="fill-fb" id="fill-fb"></div>
      <div class="fill-hint" id="fill-hint" style="display:none;"></div>
      <button class="fill-next" id="fill-next" onclick="fillNext()">Next →</button>
    </div>
  `;
}

function fillCheck(btn,chosen,correct,singular,plural,catColor,catRule){
  if(fillAnswered) return;
  const hintEl=document.getElementById('fill-hint');
  if(chosen===correct){
    fillAnswered=true; fillScore++;
    document.getElementById('fill-blank').textContent=correct;
    document.getElementById('fill-blank').classList.add('correct');
    document.querySelectorAll('.fill-choice').forEach(b=>b.disabled=true);
    btn.classList.add('correct-c');
    document.getElementById('fill-fb').textContent='✅ Correct!';
    document.getElementById('fill-fb').className='fill-fb ok';
    hintEl.innerHTML=`💡 <strong>${singular}</strong> → <strong style="color:${catColor};">${plural}</strong> &nbsp;·&nbsp; ${catRule}`;
    hintEl.style.display='block';
    document.getElementById('fill-next').classList.add('show');
  } else {
    btn.classList.add('wrong-c');
    document.getElementById('fill-fb').textContent='❌ Try again!';
    document.getElementById('fill-fb').className='fill-fb no';
    hintEl.innerHTML=`💡 <strong>${singular}</strong> → <strong style="color:${catColor};">${plural}</strong> &nbsp;·&nbsp; ${catRule}`;
    hintEl.style.display='block';
    setTimeout(()=>{btn.classList.remove('wrong-c');document.getElementById('fill-fb').textContent='';},700);
  }
}

function fillNext(){
  fillIdx++;
  if(fillIdx>=fillList.length){
    document.getElementById('fill-main').style.display='none';
    document.getElementById('fill-finish-sub').textContent=`You got ${fillScore} out of ${fillList.length} correct! 🎉`;
    document.getElementById('fill-finish').style.display='block';
  } else { renderFill(); }
}

// ══════════════════════════════════════
// BUBBLES
// ══════════════════════════════════════
(function(){
  const cv=document.getElementById('bubble-canvas');
  const cx=cv.getContext('2d');
  const cols=['#0D9488','#F43F5E','#3B82F6','#F59E0B','#6366F1','#84CC16'];
  let bs=[];
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<14;i++){
    const r=22+Math.random()*48;
    bs.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r,
      dx:(Math.random()-.5)*.5,dy:(Math.random()-.5)*.5,col:cols[i%cols.length]});
  }
  function draw(){
    cx.clearRect(0,0,cv.width,cv.height);
    bs.forEach(b=>{
      b.x+=b.dx; b.y+=b.dy;
      if(b.x<-b.r)b.x=cv.width+b.r; if(b.x>cv.width+b.r)b.x=-b.r;
      if(b.y<-b.r)b.y=cv.height+b.r; if(b.y>cv.height+b.r)b.y=-b.r;
      cx.globalAlpha=.11;
      cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fillStyle=b.col;cx.fill();
      cx.globalAlpha=.25;
      cx.beginPath();cx.arc(b.x-b.r*.28,b.y-b.r*.28,b.r*.2,0,Math.PI*2);cx.fillStyle='#fff';cx.fill();
      cx.globalAlpha=1;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
