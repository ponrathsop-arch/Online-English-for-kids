<svg width="1440" height="1800" viewBox="0 0 1440 1800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Preview of Learn English with Pang homepage</title>
  <desc id="desc">A cream colored kids English homepage with a rounded header, colorful hero card, adventure cards, category cards, activity cards, vocabinder, and story world section.</desc>
  <defs>
    <linearGradient id="pageBg" x1="720" y1="0" x2="720" y2="1800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7E8"/>
      <stop offset="0.55" stop-color="#FFFAF0"/>
      <stop offset="1" stop-color="#FFEEC9"/>
    </linearGradient>
    <linearGradient id="heroArt" x1="858" y1="203" x2="1245" y2="539" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0A8"/>
      <stop offset="0.52" stop-color="#FFD1E3"/>
      <stop offset="1" stop-color="#C9EEFF"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="144" y1="443" x2="332" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8B5F"/>
      <stop offset="1" stop-color="#FF6FA7"/>
    </linearGradient>
    <linearGradient id="adventure" x1="80" y1="668" x2="1360" y2="866" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD4E6"/>
      <stop offset="0.5" stop-color="#FFF0A8"/>
      <stop offset="1" stop-color="#D9F7C5"/>
    </linearGradient>
    <filter id="shadow" x="30" y="24" width="1380" height="1695" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#493012" flood-opacity="0.13"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#493012" flood-opacity="0.10"/>
    </filter>
    <style>
      .label{font-family:Arial, Helvetica, sans-serif;font-weight:800;fill:#27314A}
      .muted{font-family:Arial, Helvetica, sans-serif;font-weight:600;fill:#6D7390}
      .tiny{font-family:Arial, Helvetica, sans-serif;font-weight:800;fill:#F07B52;letter-spacing:3px}
      .white{fill:#fff}.ink{fill:#27314A}.pill{rx:28;filter:url(#softShadow)}
    </style>
  </defs>
  <rect width="1440" height="1800" fill="url(#pageBg)"/>
  <circle cx="138" cy="158" r="310" fill="#FFD86B" opacity="0.22"/>
  <circle cx="1245" cy="126" r="285" fill="#9B8CFF" opacity="0.16"/>

  <g filter="url(#shadow)">
    <rect x="80" y="52" width="1280" height="86" rx="34" fill="white" opacity="0.94"/>
  </g>
  <rect x="105" y="74" width="42" height="42" rx="15" fill="#FF7EB6"/>
  <text x="126" y="104" text-anchor="middle" font-size="27" class="label" fill="white">P</text>
  <text x="162" y="104" font-size="24" class="label">Pang English</text>
  <g class="muted" font-size="18">
    <text x="875" y="104">Adventures</text>
    <text x="1018" y="104">Categories</text>
    <text x="1155" y="104">Vocabinder</text>
    <text x="1290" y="104">Stories</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="178" width="1280" height="410" rx="34" fill="white" opacity="0.94"/>
  </g>
  <text x="144" y="256" font-size="18" class="tiny">BRIGHT LESSONS FOR CURIOUS KIDS</text>
  <text x="144" y="342" font-size="78" class="label">Learn English</text>
  <text x="144" y="424" font-size="78" class="label">with Pang 🌈</text>
  <text x="144" y="477" font-size="30" class="muted">Fun phonics, vocabulary, grammar and stories for kids</text>
  <rect x="144" y="518" width="182" height="58" rx="29" fill="url(#primaryBtn)"/>
  <text x="235" y="555" text-anchor="middle" font-size="20" font-weight="900" fill="white" font-family="Arial, Helvetica, sans-serif">Start Learning</text>
  <rect x="348" y="518" width="174" height="58" rx="29" fill="#FFF3D8"/>
  <text x="435" y="555" text-anchor="middle" font-size="20" class="label">Explore Stories</text>
  <rect x="825" y="225" width="430" height="300" rx="34" fill="url(#heroArt)"/>
  <text x="1040" y="330" text-anchor="middle" font-size="86">☀️</text>
  <rect x="915" y="387" width="86" height="48" rx="24" fill="white" opacity="0.86"/><text x="958" y="418" text-anchor="middle" font-size="23" class="label">cat</text>
  <rect x="1018" y="387" width="86" height="48" rx="24" fill="white" opacity="0.86"/><text x="1061" y="418" text-anchor="middle" font-size="23" class="label">run</text>
  <rect x="1121" y="387" width="100" height="48" rx="24" fill="white" opacity="0.86"/><text x="1171" y="418" text-anchor="middle" font-size="23" class="label">happy</text>

  <text x="80" y="683" font-size="18" class="tiny">PICK A PATH</text>
  <text x="80" y="736" font-size="50" class="label">Choose Your Learning Adventure</text>
  <g filter="url(#softShadow)">
    <rect x="80" y="780" width="293" height="180" rx="30" fill="#FFE27A"/>
    <rect x="409" y="780" width="293" height="180" rx="30" fill="#FFC5DF"/>
    <rect x="738" y="780" width="293" height="180" rx="30" fill="#BDF2C8"/>
    <rect x="1067" y="780" width="293" height="180" rx="30" fill="#BFE6FF"/>
  </g>
  <text x="116" y="850" font-size="52">🔤</text><text x="116" y="900" font-size="28" class="label">Phonics Quest</text><text x="116" y="934" font-size="17" class="muted">Practice sounds and blends.</text>
  <text x="445" y="850" font-size="52">🧭</text><text x="445" y="900" font-size="28" class="label">Word Explorer</text><text x="445" y="934" font-size="17" class="muted">Discover useful words.</text>
  <text x="774" y="850" font-size="52">🧱</text><text x="774" y="900" font-size="28" class="label">Grammar Builder</text><text x="774" y="934" font-size="17" class="muted">Build friendly sentences.</text>
  <text x="1103" y="850" font-size="52">📚</text><text x="1103" y="900" font-size="28" class="label">Story World</text><text x="1103" y="934" font-size="17" class="muted">Read, listen, and play.</text>

  <text x="80" y="1060" font-size="50" class="label">Categories</text>
  <g filter="url(#softShadow)">
    <rect x="80" y="1090" width="184" height="142" rx="28" fill="#FFF0A8"/>
    <rect x="295" y="1090" width="184" height="142" rx="28" fill="#FFD1E3"/>
    <rect x="510" y="1090" width="184" height="142" rx="28" fill="#D9F7C5"/>
    <rect x="725" y="1090" width="184" height="142" rx="28" fill="#C9EEFF"/>
    <rect x="940" y="1090" width="184" height="142" rx="28" fill="#E3DAFF"/>
    <rect x="1155" y="1090" width="205" height="142" rx="28" fill="#FFE2BE"/>
  </g>
  <text x="112" y="1150" font-size="42">🔤</text><text x="112" y="1198" font-size="24" class="label">Phonics</text>
  <text x="327" y="1150" font-size="42">🧸</text><text x="327" y="1198" font-size="24" class="label">Vocabulary</text>
  <text x="542" y="1150" font-size="42">✏️</text><text x="542" y="1198" font-size="24" class="label">Grammar</text>
  <text x="757" y="1150" font-size="42">📚</text><text x="757" y="1198" font-size="24" class="label">Stories</text>
  <text x="972" y="1150" font-size="42">🎮</text><text x="972" y="1198" font-size="24" class="label">Games</text>
  <text x="1187" y="1150" font-size="42">🗂️</text><text x="1187" y="1198" font-size="24" class="label">Vocabinder</text>

  <text x="80" y="1324" font-size="50" class="label">Interactive Activities</text>
  <g filter="url(#softShadow)">
    <rect x="80" y="1354" width="293" height="150" rx="28" fill="#FFE2BE"/>
    <rect x="409" y="1354" width="293" height="150" rx="28" fill="#E3DAFF"/>
    <rect x="738" y="1354" width="293" height="150" rx="28" fill="#C9EEFF"/>
    <rect x="1067" y="1354" width="293" height="150" rx="28" fill="#D9F7C5"/>
  </g>
  <text x="112" y="1418" font-size="46">🧩</text><text x="112" y="1470" font-size="26" class="label">Missing Letters</text>
  <text x="441" y="1418" font-size="46">🎯</text><text x="441" y="1470" font-size="26" class="label">Word Match</text>
  <text x="770" y="1418" font-size="46">🎧</text><text x="770" y="1470" font-size="26" class="label">Listen &amp; Choose</text>
  <text x="1099" y="1418" font-size="46">🧱</text><text x="1099" y="1470" font-size="26" class="label">Build the Word</text>

  <g filter="url(#shadow)">
    <rect x="80" y="1560" width="620" height="175" rx="34" fill="white"/>
    <rect x="740" y="1560" width="620" height="175" rx="34" fill="white"/>
  </g>
  <text x="124" y="1625" font-size="42" class="label">Vocabinder 🗂️</text>
  <text x="124" y="1670" font-size="22" class="muted">Choose a deck, then click Back or Next.</text>
  <rect x="500" y="1600" width="136" height="98" rx="24" fill="#FFF3D8"/><text x="568" y="1664" text-anchor="middle" font-size="54">🎾</text>
  <text x="784" y="1625" font-size="42" class="label">Story World 📚</text>
  <text x="784" y="1670" font-size="22" class="muted">Interactive stories with reading, listening, words, and games.</text>
  <rect x="784" y="1692" width="95" height="32" rx="16" fill="#FFD1E3"/><text x="832" y="1714" text-anchor="middle" font-size="17" class="label">Read</text>
  <rect x="894" y="1692" width="95" height="32" rx="16" fill="#FFF0A8"/><text x="942" y="1714" text-anchor="middle" font-size="17" class="label">Listen</text>
  <rect x="1004" y="1692" width="132" height="32" rx="16" fill="#D9F7C5"/><text x="1070" y="1714" text-anchor="middle" font-size="17" class="label">Learn Words</text>
</svg>
