<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 Years Old – English with Pang</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #e0f4ff;
    --yellow: #FFD93D;
    --coral: #FF6B6B;
    --green: #6BCB77;
    --purple: #C77DFF;
    --blue: #4D96FF;
    --orange: #FF9A3C;
    --pink: #FF84B7;
    --dark: #2d2d2d;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background-color: var(--sky);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-shapes {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
    animation: float linear infinite;
  }
  .shape:nth-child(1) { width: 120px; height: 120px; background: var(--yellow); top: 10%; left: 5%; animation-duration: 14s; }
  .shape:nth-child(2) { width: 80px; height: 80px; background: var(--coral); top: 30%; right: 8%; animation-duration: 10s; animation-delay: -3s; }
  .shape:nth-child(3) { width: 60px; height: 60px; background: var(--green); bottom: 20%; left: 12%; animation-duration: 12s; animation-delay: -6s; }
  .shape:nth-child(4) { width: 100px; height: 100px; background: var(--purple); bottom: 10%; right: 15%; animation-duration: 16s; animation-delay: -2s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    33% { transform: translateY(-20px) rotate(120deg); }
    66% { transform: translateY(10px) rotate(240deg); }
  }

  .back-btn {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 28px 0 0 28px;
    padding: 8px 18px;
    background: white;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    color: #555;
    text-decoration: none;
    box-shadow: 0 4px 0 rgba(0,0,0,0.08);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .back-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 0 rgba(0,0,0,0.08);
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px 20px 30px;
  }

  .star-row {
    font-size: 22px;
    letter-spacing: 6px;
    margin-bottom: 12px;
    animation: twinkle 2s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.6; transform: scale(1); }
    to { opacity: 1; transform: scale(1.05); }
  }

  .age-label {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(16px, 3vw, 22px);
    color: #888;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(48px, 10vw, 80px);
    line-height: 1;
    display: inline-flex;
    gap: 4px;
  }

  h1 span {
    display: inline-block;
    animation: bounce-letter 1.5s ease-in-out infinite alternate;
  }
  h1 span:nth-child(1) { color: var(--coral); animation-delay: 0s; }
  h1 span:nth-child(2) { color: var(--orange); animation-delay: 0.1s; }
  h1 span:nth-child(3) { color: var(--yellow); animation-delay: 0.2s; }
  h1 span:nth-child(4) { color: var(--green); animation-delay: 0.3s; }
  h1 span:nth-child(5) { color: var(--blue); animation-delay: 0.4s; }
  h1 span:nth-child(6) { color: var(--purple); animation-delay: 0.5s; }
  h1 span:nth-child(7) { color: var(--pink); animation-delay: 0.6s; }
  h1 span:nth-child(8) { color: var(--coral); animation-delay: 0.7s; }
  h1 span:nth-child(9) { color: var(--orange); animation-delay: 0.8s; }
  h1 span:nth-child(10) { color: var(--yellow); animation-delay: 0.9s; }
  h1 span:nth-child(11) { color: var(--green); animation-delay: 1.0s; }

  @keyframes bounce-letter {
    from { transform: translateY(0); }
    to { transform: translateY(-8px); }
  }

  .subtitle {
    margin-top: 12px;
    font-size: 17px;
    color: #555;
    font-weight: 600;
  }

  .grid-section {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 24px 80px;
  }

  .section-label {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: #777;
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: 1px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 24px;
  }

  .card {
    background: white;
    border-radius: 24px;
    padding: 32px 24px 28px;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    display: block;
    position: relative;
    overflow: hidden;
    border: 3px solid transparent;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    box-shadow: 0 6px 0 rgba(0,0,0,0.08);
    opacity: 0;
    transform: translateY(30px);
    animation: card-in 0.5s ease forwards;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }

  @keyframes card-in {
    to { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    border-radius: 24px 24px 0 0;
  }

  .card:hover { transform: translateY(-6px); box-shadow: 0 14px 0 rgba(0,0,0,0.08); }

  .card-1::before { background: var(--coral); }
  .card-2::before { background: var(--blue); }
  .card:hover.card-1 { border-color: var(--coral); }
  .card:hover.card-2 { border-color: var(--blue); }

  .card-emoji { font-size: 48px; display: block; margin-bottom: 14px; line-height: 1; }
  .card-title { font-family: 'Fredoka One', cursive; font-size: 22px; color: var(--dark); margin-bottom: 8px; }
  .card-desc { font-size: 13px; color: #888; font-weight: 600; line-height: 1.5; }

  .card-badge {
    display: inline-block;
    margin-top: 14px;
    padding: 4px 14px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .card-1 .card-badge { background: #fff0ee; color: var(--coral); }
  .card-2 .card-badge { background: #eef4ff; color: var(--blue); }

  .card-soon {
    opacity: 0.45 !important;
    cursor: default;
    pointer-events: none;
  }
  .card-soon::after {
    content: 'Coming Soon';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-15deg);
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    color: #aaa;
    border: 3px dashed #ccc;
    padding: 6px 16px;
    border-radius: 8px;
    white-space: nowrap;
  }

  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 20px;
    font-size: 13px;
    color: #aaa;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="bg-shapes">
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
</div>

<a href="../index.html" class="back-btn">← Back to Home</a>

<header>
  <div class="star-row">🌟 ⭐ 🌟 ⭐ 🌟</div>
  <p class="age-label">Lessons for</p>
  <h1>
    <span>3</span><span> </span><span>Y</span><span>e</span><span>a</span><span>r</span><span>s</span><span> </span><span>O</span><span>l</span><span>d</span>
  </h1>
  <p class="subtitle">Pick a lesson to start! 🚀</p>
</header>

<section class="grid-section">
  <p class="section-label">📖 Lessons</p>
  <div class="grid">

    <a href="lesson-1/index.html" class="card card-1">
      <span class="card-emoji">🐣</span>
      <div class="card-title">Lesson 1</div>
      <div class="card-desc">Your first English lesson</div>
      <span class="card-badge">Start here</span>
    </a>

    <div class="card card-2 card-soon">
      <span class="card-emoji">📚</span>
      <div class="card-title">Lesson 2</div>
      <div class="card-desc">Coming soon</div>
      <span class="card-badge">Next up</span>
    </div>

  </div>
</section>

<footer>Pang made with ❤️ for kids learning English</footer>

</body>
</html>
