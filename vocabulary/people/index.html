<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People — Learn English</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --purple:#7C3AED;--coral:#FF6B6B;--blue:#3B82F6;
  --green:#6BCB77;--orange:#FF9F43;--yellow:#FFD93D;
  --bg:#FEF9F0;--text:#2D2D2D;--muted:#888;
}
body{font-family:'Nunito',sans-serif;font-weight:800;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
#rainbow-bar{position:fixed;top:0;left:0;right:0;height:7px;background:linear-gradient(90deg,#FF6B6B,#FF9F43,#FFD93D,#6BCB77,#3B82F6,#7C3AED,#FF6B6B);z-index:1000;}
#bubble-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#app{position:relative;z-index:1;padding-top:14px;min-height:100vh;}

.screen{display:none;max-width:480px;margin:0 auto;padding:16px 16px 40px;}
.screen.active{display:block;}

/* ── HOME ── */
#home-screen{padding-top:40px;text-align:center;}
.home-title{font-family:'Fredoka One',cursive;font-size:2.6rem;color:var(--purple);line-height:1.1;margin-bottom:6px;}
.home-sub{font-size:.95rem;color:var(--muted);margin-bottom:40px;}
.home-learn-btns{display:flex;flex-direction:column;gap:16px;max-width:340px;margin:0 auto 32px;}
.home-learn-btn{border:none;border-radius:22px;padding:22px 24px;display:flex;align-items:center;gap:18px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.12);transition:transform .18s,box-shadow .18s;width:100%;text-align:left;color:#fff;}
.home-learn-btn:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.18);}
.home-learn-btn:nth-child(1){background:var(--blue);}
.home-learn-btn:nth-child(2){background:var(--coral);}
.home-learn-btn .hlb-icon{font-size:2.2rem;flex-shrink:0;}
.home-learn-btn .hlb-name{font-family:'Fredoka One',cursive;font-size:1.25rem;display:block;}
.home-learn-btn .hlb-desc{font-size:.8rem;opacity:.85;}
.home-sec-btns{display:flex;gap:12px;max-width:340px;margin:0 auto 28px;}
.home-sec-btn{flex:1;border:none;border-radius:18px;padding:16px 12px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.10);transition:transform .18s;text-align:left;color:#fff;}
.home-sec-btn:hover{transform:translateY(-2px);}
.home-sec-btn:nth-child(1){background:var(--green);}
.home-sec-btn:nth-child(2){background:var(--purple);}
.home-sec-btn .hsb-icon{font-size:1.7rem;flex-shrink:0;}
.home-sec-btn .hsb-name{font-family:'Fredoka One',cursive;font-size:1rem;display:block;}
.home-sec-btn .hsb-desc{font-size:.72rem;opacity:.85;}

/* ── BOTTOM NAV ── */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #eee;z-index:500;height:62px;}
#bottom-nav.visible{display:flex;}
.bnav-btn{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;color:var(--muted);padding:4px 1px;transition:all .18s;}
.bnav-btn .bn-icon{font-size:15px;line-height:1;}
.bnav-btn.active{color:#fff;}
.bnav-btn.set1-btn.active{background:var(--blue);}
.bnav-btn.set2-btn.active{background:var(--coral);}
.bnav-btn.set3-btn.active{background:var(--green);}
.bnav-btn.set4-btn.active{background:var(--orange);}
.bnav-btn.wf-btn.active{background:var(--purple);}
.bnav-btn.pf-btn.active{background:var(--blue);}
.bnav-btn.mem-btn.active{background:var(--purple);color:#fff;}
.bnav-btn.sum-btn.active{background:var(--green);color:#fff;}
.bnav-btn.spell-btn.active{background:var(--coral);color:#fff;}
.screen.has-nav{padding-bottom:72px;}

/* ── FLASHCARD ── */
#flashcard-screen{padding-top:14px;}
.fc-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.back-btn{background:none;border:2px solid #ddd;border-radius:50px;padding:7px 16px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.86rem;color:var(--muted);cursor:pointer;transition:all .15s;}
.back-btn:hover{border-color:var(--text);color:var(--text);}
.fc-progress{font-size:.83rem;color:var(--muted);}
.fc-slide{display:flex;flex-direction:column;align-items:center;padding:6px 0 28px;cursor:pointer;text-align:center;user-select:none;min-height:calc(100vh - 100px);}
.fc-word-badge{font-family:'Fredoka One',cursive;font-size:3.2rem;margin-bottom:16px;}
.fc-slide.word-only{justify-content:center;}
.fc-slide.word-only .fc-word-badge{font-size:4rem;margin-bottom:0;}
.fc-img-wrap{width:220px;height:220px;margin:0 auto 16px;}
.fc-img{width:220px;height:220px;object-fit:cover;border-radius:22px;box-shadow:0 8px 32px rgba(0,0,0,.13);display:block;}
.fc-img-ph{width:220px;height:220px;border-radius:22px;display:none;align-items:center;justify-content:center;font-size:5.5rem;background:rgba(0,0,0,.05);}
.sentence-box{background:rgba(255,255,255,.92);border-radius:20px;padding:15px 22px;font-size:1.12rem;font-weight:800;box-shadow:0 4px 24px rgba(0,0,0,.11);max-width:340px;width:100%;line-height:1.6;visibility:hidden;opacity:0;transform:translateY(14px);transition:opacity .4s,transform .4s;margin:0 auto 10px;border-top:5px solid var(--purple);text-align:center;}
.sentence-box.show{visibility:visible;opacity:1;transform:translateY(0);}
.fc-nav-row{position:fixed;bottom:72px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:24px;z-index:10;}
.fc-nav-pill{background:rgba(255,255,255,.9);border:2px solid #ddd;border-radius:50px;padding:8px 22px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .18s;line-height:1;}
.fc-nav-pill:hover{border-color:var(--purple);color:var(--purple);}
.fc-nav-pill.hint{font-size:.78rem;animation:pulse 1.8s infinite;cursor:default;border-color:transparent;background:rgba(255,255,255,.7);}
.fc-nav-pill.hidden{visibility:hidden;}
@keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}
.dot-row{display:flex;gap:8px;justify-content:center;margin-top:14px;}
.dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:all .3s;}
.dot.active{background:var(--purple);transform:scale(1.3);}
.dot.done{background:#A78BFA;}
.finish-card{background:rgba(255,255,255,.95);border-radius:26px;box-shadow:0 6px 28px rgba(0,0,0,.1);text-align:center;padding:38px 26px;animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.trophy{font-size:3.8rem;display:inline-block;animation:bounce 1s infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-12px);}}
.finish-title{font-family:'Fredoka One',cursive;font-size:1.75rem;margin:10px 0 5px;color:var(--purple);}
.finish-sub{color:var(--muted);font-size:.92rem;margin-bottom:20px;}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.pill-btn{border:none;border-radius:50px;padding:13px 28px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.97rem;cursor:pointer;transition:transform .15s;color:#fff;}
.pill-btn:hover{transform:scale(1.05);}
.btn-green{background:var(--green);}
.btn-orange{background:var(--orange);}
.btn-purple{background:var(--purple);}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

/* ── MEMORY ── */
#memory-screen{padding-top:14px;max-width:100%!important;}
.mem-status{text-align:center;font-size:1rem;color:var(--muted);margin-bottom:10px;font-weight:900;}
.mem-two-col{display:flex;gap:20px;justify-content:center;align-items:flex-start;padding:0 20px;}
.mem-col{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;flex:1;max-width:46vw;}
.mem-col-title{font-family:'Fredoka One',cursive;font-size:1rem;text-align:center;margin-bottom:8px;color:var(--purple);}
.mem-card{width:100%;aspect-ratio:1;perspective:600px;cursor:pointer;min-height:100px;}
.mem-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.34,1.2,.64,1);border-radius:16px;}
.mem-card.flipped .mem-inner{transform:rotateY(180deg);}
.mem-front,.mem-back{position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.13);}
.mem-front{background:linear-gradient(135deg,var(--purple),#5b21b6);font-family:'Fredoka One',cursive;font-size:2rem;color:#fff;}
.mem-back{background:#fff;transform:rotateY(180deg);overflow:hidden;border:3px solid #fff;}
.mem-back img{width:100%;height:calc(100% - 28px);object-fit:cover;display:block;}
.mem-back .mem-name{font-family:'Fredoka One',cursive;font-size:.85rem;color:var(--text);height:28px;line-height:28px;display:none;text-align:center;width:100%;}
.mem-card.matched .mem-inner{box-shadow:0 0 0 4px var(--green);}
.mem-card.matched .mem-front{background:linear-gradient(135deg,var(--green),#15803d);}
.mem-card.matched .mem-back .mem-name{display:block;}

/* ── SUMMARY ── */
#summary-screen{padding-top:14px;}
.summary-grid{display:grid;grid-template-columns:repeat(1,1fr);gap:12px;margin-bottom:20px;}
.summary-card{background:rgba(255,255,255,.92);border-radius:18px;box-shadow:0 4px 16px rgba(0,0,0,.09);padding:12px 16px;border-left:5px solid var(--purple);transition:transform .15s;display:flex;align-items:center;gap:16px;}
.summary-card:hover{transform:translateX(3px);}
.summary-card img{width:72px;height:72px;object-fit:cover;border-radius:12px;display:block;flex-shrink:0;}
.summary-card .s-ph{width:72px;height:72px;border-radius:12px;display:none;align-items:center;justify-content:center;font-size:2rem;background:rgba(0,0,0,.05);flex-shrink:0;}
.summary-card .s-name{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--text);}
.summary-nav{display:flex;gap:12px;justify-content:center;align-items:center;margin-top:6px;}
.summary-nav button{border:2px solid #ddd;background:rgba(255,255,255,.9);border-radius:50px;padding:8px 24px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;color:var(--muted);cursor:pointer;transition:all .18s;}
.summary-nav button:hover{border-color:var(--purple);color:var(--purple);}
.summary-nav .s-page-info{font-size:.85rem;color:var(--muted);min-width:80px;text-align:center;}

/* ── VOCABINDER ── */
#voca-screen{padding-top:14px;max-width:480px;margin:0 auto;}
.voca-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.voca-score-row{display:flex;gap:8px;justify-content:center;margin-bottom:10px;font-weight:800;font-size:.82rem;}
.voca-pill{padding:4px 14px;border-radius:50px;}
.vp-g{background:rgba(107,203,119,.18);color:#2e8a3a;}
.vp-r{background:rgba(255,107,107,.18);color:#c0392b;}
.vp-b{background:rgba(59,130,246,.18);color:#2563eb;}
.voca-prog-wrap{width:100%;height:6px;background:rgba(0,0,0,.08);border-radius:8px;margin-bottom:14px;overflow:hidden;}
.voca-prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:8px;transition:width .4s ease;}
.voca-card-area{position:relative;display:flex;justify-content:center;align-items:center;margin-bottom:14px;height:300px;}
.voca-card{position:absolute;width:260px;height:280px;background:#fff;border-radius:28px;box-shadow:0 10px 36px rgba(0,0,0,.13);display:flex;flex-direction:column;align-items:center;justify-content:center;touch-action:none;will-change:transform;border:3px solid rgba(0,0,0,.05);cursor:grab;}
.voca-card.correct-flash{border-color:var(--green)!important;box-shadow:0 0 0 4px rgba(107,203,119,.4),0 10px 36px rgba(0,0,0,.13)!important;}
.voca-card.wrong-flash{border-color:var(--coral)!important;box-shadow:0 0 0 4px rgba(255,107,107,.35),0 10px 36px rgba(0,0,0,.13)!important;animation:vcShake .45s ease;}
@keyframes vcShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-10px);}40%{transform:translateX(10px);}60%{transform:translateX(-7px);}80%{transform:translateX(7px);}}
.voca-peek{position:absolute;top:50%;transform:translateY(-50%);font-family:'Fredoka One',cursive;font-size:1rem;padding:6px 12px;border-radius:12px;opacity:0;pointer-events:none;transition:opacity .06s;white-space:nowrap;z-index:10;}
.voca-peek-left{right:calc(50% + 140px);background:rgba(59,130,246,.12);color:var(--blue);border:2.5px solid var(--blue);}
.voca-peek-right{left:calc(50% + 140px);background:rgba(59,130,246,.12);color:var(--blue);border:2.5px solid var(--blue);}
.voca-choices{display:flex;gap:12px;width:100%;max-width:340px;margin:0 auto 14px;}
.voca-choice{flex:1;padding:14px 8px;border-radius:20px;border:3px solid rgba(0,0,0,.07);font-family:'Fredoka One',cursive;font-size:1.3rem;cursor:pointer;transition:all .14s;background:#fff;color:var(--text);box-shadow:0 4px 14px rgba(0,0,0,.09);display:flex;align-items:center;justify-content:center;gap:6px;}
.voca-choice:hover{transform:translateY(-2px);}
.voca-choice.flash-correct{background:var(--green)!important;color:#fff!important;border-color:var(--green)!important;}
.voca-choice.flash-wrong{background:var(--coral)!important;color:#fff!important;border-color:var(--coral)!important;animation:vcShake .4s ease;}
.voca-comp{display:none;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:20px;}
.voca-comp.on{display:flex;animation:fadeUp .5s ease;}

/* ── SPELLING ── */
#spell-screen{padding-top:14px;}
.spell-card{background:rgba(255,255,255,.92);border-radius:22px;box-shadow:0 5px 22px rgba(0,0,0,.09);padding:24px 18px;text-align:center;border-top:5px solid var(--purple);}
.spell-img{width:180px;height:180px;object-fit:cover;border-radius:16px;margin:0 auto 14px;display:block;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.spell-img-ph{width:180px;height:180px;border-radius:16px;margin:0 auto 14px;display:none;align-items:center;justify-content:center;font-size:4rem;background:rgba(0,0,0,.05);}
.spell-prompt{font-size:.88rem;color:var(--muted);margin-bottom:16px;font-weight:900;}
.spell-choices{display:flex;flex-direction:column;gap:10px;max-width:340px;margin:0 auto 10px;}
.spell-choice{border:2px solid transparent;border-radius:50px;padding:13px 20px;font-family:'Fredoka One',cursive;font-size:1.3rem;background:rgba(255,255,255,.9);box-shadow:0 3px 12px rgba(0,0,0,.09);cursor:pointer;color:var(--text);transition:all .2s;}
.spell-choice:hover:not(:disabled){border-color:var(--purple);}
.spell-choice.correct-spell{background:var(--green);color:#fff;border-color:var(--green);}
.spell-choice.wrong-spell{animation:shake .4s;border-color:var(--coral);}
.spell-choice:disabled{opacity:.6;cursor:default;}
.spell-next-btn{display:none;background:var(--purple);color:#fff;border:none;border-radius:50px;padding:12px 32px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.97rem;cursor:pointer;transition:transform .15s;margin-top:8px;}
.spell-next-btn.show{display:inline-block;}
.spell-next-btn:hover{transform:scale(1.05);}

#footer{text-align:center;padding:22px 16px 10px;font-size:.76rem;color:var(--muted);position:relative;z-index:1;}
</style>
</head>
<body>
<div id="rainbow-bar"></div>
<canvas id="bubble-canvas"></canvas>
<div id="app">

<!-- ═══ HOME ═══ -->
<div id="home-screen" class="screen active">
  <div class="home-title">👨‍👩‍👧 People</div>
  <div class="home-sub">Learn English words about people!</div>
  <div class="home-learn-btns">
    <button class="home-learn-btn" onclick="startActivity('learn11')">
      <span class="hlb-icon">📖</span>
      <span class="hlb-info"><span class="hlb-name">Word First</span><span class="hlb-desc">See the word → tap to reveal picture &amp; sentences</span></span>
    </button>
    <button class="home-learn-btn" onclick="startActivity('learn12')">
      <span class="hlb-icon">🖼️</span>
      <span class="hlb-info"><span class="hlb-name">Picture First</span><span class="hlb-desc">See the picture → tap to reveal word &amp; sentences</span></span>
    </button>
  </div>
  <div class="home-sec-btns">
    <button class="home-sec-btn" onclick="startActivity('summary')">
      <span class="hsb-icon">📋</span>
      <span><span class="hsb-name">All People</span><span class="hsb-desc">Review all pictures &amp; names</span></span>
    </button>
    <button class="home-sec-btn" onclick="showVocabinder()">
      <span class="hsb-icon">🎴</span>
      <span><span class="hsb-name">Vocabinder</span><span class="hsb-desc">Swipe &amp; guess the person!</span></span>
    </button>
  </div>
  <div class="home-sec-btns" style="max-width:340px;margin:-16px auto 28px;">
    <button class="home-sec-btn" style="background:var(--coral);flex:none;width:100%;" onclick="startActivity('spell')">
      <span class="hsb-icon">🔤</span>
      <span><span class="hsb-name">Spelling</span><span class="hsb-desc">Pick the correct spelling!</span></span>
    </button>
  </div>
  <div id="footer">Pang made with ❤️ for kids learning English</div>
</div>

<!-- ═══ BOTTOM NAV ═══ -->
<div id="bottom-nav">
  <button class="bnav-btn set1-btn" id="bn-s1" onclick="bnSwitch(0)"><span class="bn-icon">🧑</span>Set 1</button>
  <button class="bnav-btn set2-btn" id="bn-s2" onclick="bnSwitch(1)"><span class="bn-icon">👨‍👩‍👧</span>Set 2</button>
  <button class="bnav-btn set3-btn" id="bn-s3" onclick="bnSwitch(2)"><span class="bn-icon">👴</span>Set 3</button>
  <button class="bnav-btn set4-btn" id="bn-s4" onclick="bnSwitch(3)"><span class="bn-icon">🤝</span>Set 4</button>
  <button class="bnav-btn wf-btn"   id="bn-wf"   onclick="bnActivity('learn11')"><span class="bn-icon">📖</span>Word</button>
  <button class="bnav-btn pf-btn"   id="bn-pf"   onclick="bnActivity('learn12')"><span class="bn-icon">🖼️</span>Pic</button>
  <button class="bnav-btn mem-btn"  id="bn-mem"  onclick="bnActivity('memory')"><span class="bn-icon">🧠</span>Mem</button>
  <button class="bnav-btn spell-btn" id="bn-spell" onclick="bnActivity('spell')"><span class="bn-icon">🔤</span>Spell</button>
  <button class="bnav-btn sum-btn"  id="bn-sum"  onclick="bnActivity('summary')"><span class="bn-icon">📋</span>All</button>
</div>

<!-- ═══ FLASHCARD ═══ -->
<div id="flashcard-screen" class="screen">
  <div class="fc-topbar">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div style="font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--purple);" id="fc-mode-label"></div>
    <div class="fc-progress" id="fc-progress"></div>
  </div>
  <div class="fc-slide" id="fc-slide" onclick="fcTap()">
    <div class="fc-word-badge" id="fc-word" style="display:none;"></div>
    <div class="fc-img-wrap" id="fc-img1-wrap" style="display:none;">
      <img id="fc-img1" class="fc-img" src="" alt="">
      <div id="fc-img1-ph" class="fc-img-ph"></div>
    </div>
    <div class="fc-img-wrap" id="fc-img2-wrap" style="display:none;">
      <img id="fc-img2" class="fc-img" src="" alt="">
      <div id="fc-img2-ph" class="fc-img-ph"></div>
    </div>
    <div class="sentence-box" id="fc-s1"></div>
    <div class="sentence-box" id="fc-s2"></div>
    <div class="sentence-box" id="fc-s3"></div>
    <div class="dot-row" id="fc-dots"></div>
  </div>
  <div class="fc-nav-row">
    <button class="fc-nav-pill hidden" id="fc-prev-btn" onclick="fcPrev()">←</button>
    <div class="fc-nav-pill hint" id="fc-hint">tap to continue</div>
    <button class="fc-nav-pill" id="fc-next-btn" onclick="fcTap()">→</button>
  </div>
  <div id="fc-finish" style="display:none;">
    <div class="finish-card">
      <div class="trophy">🏆</div>
      <div class="finish-title">Great Job!</div>
      <div class="finish-sub">You finished all the cards!</div>
      <div class="btn-row">
        <button class="pill-btn btn-orange" onclick="restartFC()">Try Again</button>
        <button class="pill-btn btn-purple" onclick="goHome()">Menu</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ MEMORY ═══ -->
<div id="memory-screen" class="screen">
  <div class="fc-topbar">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div style="font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--purple);">🧠 Memory</div>

<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const EMOJIS = {
  baby:'👶',boy:'👦',girl:'👧',child:'🧒',children:'👧👦',
  man:'👨',men:'👨👨',woman:'👩',women:'👩👩',person:'🧑',people:'👥',
  family:'👨‍👩‍👧',mother:'👩',father:'👨',parents:'👨‍👩‍👧',son:'👦',
  daughter:'👧',brother:'👦',sister:'👧',
  grandmother:'👵',grandfather:'👴',uncle:'👨',aunt:'👩',cousin:'🧒',
  friend:'🤝',classmate:'🧑‍🎓',teacher:'👩‍🏫',student:'🧑‍🎓'
};

const ACCENTS=['#7C3AED','#FF6B6B','#3B82F6','#6BCB77','#FF9F43','#FFD93D','#7C3AED','#FF6B6B','#3B82F6','#6BCB77','#FF9F43','#FFD93D'];

const WORDS=[
  // ── SET 0 ──
  {id:'baby',word:'baby',set:0,sentences:['The baby is sleeping in the bed.','The baby is very small and quiet.','Everyone loves the baby.'],fillQ:'The {blank} is sleeping in the bed.'},
  {id:'boy',word:'boy',set:0,sentences:['The boy is running in the park.','The boy is wearing a red shirt.','The boy likes to play football.'],fillQ:'The {blank} is running in the park.'},
  {id:'girl',word:'girl',set:0,sentences:['The girl is happy today.','The girl is wearing a nice dress.','The girl likes to read books.'],fillQ:'The {blank} is happy today.'},
  {id:'child',word:'child',set:0,sentences:['The child is playing in the room.','The child is having fun with toys.','Every child loves to play.'],fillQ:'The {blank} is playing in the room.'},
  {id:'children',word:'children',set:0,sentences:['The children are playing in the park.','The children are laughing together.','The children are very happy.'],fillQ:'The {blank} are playing in the park.'},
  {id:'man',word:'man',set:0,sentences:['The man is tall and strong.','The man is walking on the street.','The man is wearing blue pants.'],fillQ:'The {blank} is walking on the street.'},
  {id:'men',word:'men',set:0,sentences:['The men are working in the office.','The men are talking together.','The men are very busy today.'],fillQ:'The {blank} are working in the office.'},
  {id:'woman',word:'woman',set:0,sentences:['The woman is my teacher.','The woman is smiling.','The woman has short hair.'],fillQ:'The {blank} is smiling.'},
  {id:'women',word:'women',set:0,sentences:['The women are talking in the park.','The women are happy.','The women are very kind.'],fillQ:'The {blank} are talking in the park.'},
  {id:'person',word:'person',set:0,sentences:['There is one person in the room.','The person is sitting on a chair.','The person is reading a book.'],fillQ:'There is one {blank} in the room.'},
  {id:'people',word:'people',set:0,sentences:['There are many people in the park.','The people are happy and relaxed.','The people are eating and playing together.'],fillQ:'There are many {blank} in the park.'},
  // ── SET 1 ──
  {id:'family',word:'family',set:1,sentences:['This is my family.','My family is happy together.','I love my family very much.'],fillQ:'This is my {blank}.'},
  {id:'mother',word:'mother / mum',set:1,spellWords:['mother','mum'],sentences:['This is my mother.','My mum is cooking in the kitchen.','My mother is very kind.'],fillQ:'My {blank} is cooking in the kitchen.'},
  {id:'father',word:'father / dad',set:1,spellWords:['father','dad'],sentences:['My father is reading a book.','My dad is driving a car.','My father is tall and strong.'],fillQ:'My {blank} is reading a book.'},
  {id:'parents',word:'parents',set:1,sentences:['My parents are at home.','My parents are happy together.','My parents take care of me.'],fillQ:'My {blank} are at home.'},
  {id:'son',word:'son',set:1,sentences:['He is their son.','The son is playing football.','The son helps his father at home.'],fillQ:'The {blank} is playing football.'},
  {id:'daughter',word:'daughter',set:1,sentences:['She is their daughter.','The daughter is singing a song.','The daughter helps her mother cook.'],fillQ:'The {blank} is singing a song.'},
  {id:'brother',word:'brother',set:1,sentences:['My brother likes to run.','My brother is very funny.','My brother plays with me every day.'],fillQ:'My {blank} likes to run.'},
  {id:'sister',word:'sister',set:1,sentences:['My sister likes to sing.','My sister is reading a book.','My sister is very kind to me.'],fillQ:'My {blank} likes to sing.'},
  // ── SET 2 ──
  {id:'grandmother',word:'grandmother / grandma',set:2,spellWords:['grandmother','grandma'],sentences:['My grandmother is very kind.','My grandma is cooking food.','My grandmother tells me stories at night.'],fillQ:'My {blank} is cooking food.'},
  {id:'grandfather',word:'grandfather / grandad',set:2,spellWords:['grandfather','grandad'],sentences:['My grandfather is old and wise.','My grandad is watching TV.','My grandfather tells funny stories.'],fillQ:'My {blank} is watching TV.'},
  {id:'uncle',word:'uncle',set:2,sentences:['This is my uncle.','My uncle is tall and friendly.','My uncle visits us every weekend.'],fillQ:'This is my {blank}.'},
  {id:'aunt',word:'aunt',set:2,sentences:['This is my aunt.','My aunt is very nice.','My aunt brings me gifts.'],fillQ:'This is my {blank}.'},
  {id:'cousin',word:'cousin',set:2,sentences:['This is my cousin.','My cousin is playing with me.','My cousin lives near my house.'],fillQ:'This is my {blank}.'},
  // ── SET 3 ──
  {id:'friend',word:'friend',set:3,sentences:['He is my friend.','We play together after school.','My friend is always kind to me.'],fillQ:'He is my {blank}.'},
  {id:'classmate',word:'classmate',set:3,sentences:['She is my classmate.','We study in the same classroom.','My classmate sits next to me.'],fillQ:'She is my {blank}.'},
  {id:'teacher',word:'teacher',set:3,sentences:['She is my teacher.','The teacher is talking in class.','My teacher helps me learn new things.'],fillQ:'She is my {blank}.'},
  {id:'student',word:'student',set:3,sentences:['She is a student.','The student is writing in a notebook.','The student is listening to the teacher.'],fillQ:'She is a {blank}.'},
];

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let currentSet=0;
let fcMode='',fcList=[],fcIdx=0,fcTapState=0;
let sumPage=0;

// ══════════════════════════════════════
// UTILS
// ── KEY CHANGE: imgSrc always uses '' suffix — only word.jpg used ──
// ══════════════════════════════════════
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;};
const setWords=()=>WORDS.filter(w=>w.set===currentSet);
const imgSrc=(id)=>id.replace(' ','')+'.jpg';  // ← no suffix parameter at all

function setImg(imgEl,phEl,id){
  const src=imgSrc(id);
  imgEl.src=src; imgEl.alt=id;
  imgEl.style.display='block'; phEl.style.display='none';
  imgEl.onerror=()=>{imgEl.style.display='none';phEl.textContent=EMOJIS[id]||'❓';phEl.style.display='flex';};
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
let currentActivity='';

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  const nav=document.getElementById('bottom-nav');
  if(id==='home-screen'||id==='voca-screen'){nav.classList.remove('visible');}
  else{nav.classList.add('visible');}
}
function goHome(){showScreen('home-screen');}

function bnSwitch(setIdx){
  currentSet=setIdx;
  updateBnavSets();
  startActivity(currentActivity||'learn11');
}
function bnActivity(act){startActivity(act);}

function updateBnavSets(){
  ['bn-s1','bn-s2','bn-s3','bn-s4'].forEach((id,i)=>
    document.getElementById(id).classList.toggle('active',currentSet===i));
}

function updateBnavActivity(act){
  document.getElementById('bn-wf').classList.toggle('active',act==='learn11');
  document.getElementById('bn-pf').classList.toggle('active',act==='learn12');
  const mem=document.getElementById('bn-mem');
  mem.classList.toggle('active',act==='memory');
  if(act==='memory'){mem.style.background='var(--purple)';mem.style.color='#fff';}
  else{mem.style.background='';mem.style.color='';}
  const sum=document.getElementById('bn-sum');
  sum.classList.toggle('active',act==='summary');
  if(act==='summary'){sum.style.background='var(--green)';sum.style.color='#fff';}
  else{sum.style.background='';sum.style.color='';}
  const sp=document.getElementById('bn-spell');
  sp.classList.toggle('active',act==='spell');
  if(act==='spell'){sp.style.background='var(--coral)';sp.style.color='#fff';}
  else{sp.style.background='';sp.style.color='';}
}

// ══════════════════════════════════════
// START ACTIVITY
// ══════════════════════════════════════
function startActivity(act){
  currentActivity=act;
  updateBnavSets();
  updateBnavActivity(act);
  if(act==='learn11'||act==='learn12'){
    fcMode=act; fcList=[...setWords()]; fcIdx=0;
    document.getElementById('fc-mode-label').textContent=act==='learn11'?'📖 Word First':'🖼️ Picture First';
    buildDots();
    showScreen('flashcard-screen');
    document.getElementById('fc-finish').style.display='none';
    document.getElementById('fc-slide').style.display='flex';
    document.querySelector('.fc-nav-row').style.display='flex';
    renderFC();
  } else if(act==='memory'){
    showScreen('memory-screen');
    document.getElementById('mem-finish').style.display='none';
    initMemory();
  } else if(act==='summary'){
    showScreen('summary-screen');
    sumPage=0;
    renderSummary();
  } else if(act==='spell'){
    showScreen('spell-screen');
    document.getElementById('spell-finish').style.display='none';
    document.getElementById('spell-main').style.display='block';
    initSpell();
  }
}

// ══════════════════════════════════════
// FLASHCARD — both img1 and img2 use same word.jpg
// ══════════════════════════════════════
function buildDots(){
  const dr=document.getElementById('fc-dots'); dr.innerHTML='';
  fcList.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.id='fcd'+i;dr.appendChild(d);});
}
function updateDots(){
  fcList.forEach((_,i)=>{const d=document.getElementById('fcd'+i);if(d)d.className='dot'+(i<fcIdx?' done':i===fcIdx?' active':'');});
}
function resetSlide(){
  document.getElementById('fc-slide').classList.remove('word-only');
  document.getElementById('fc-word').style.display='none';
  document.getElementById('fc-img1-wrap').style.display='none';
  document.getElementById('fc-img2-wrap').style.display='none';
  ['fc-s1','fc-s2','fc-s3'].forEach(id=>document.getElementById(id).classList.remove('show'));
  document.getElementById('fc-hint').textContent='Tap to continue →';
  const prev=document.getElementById('fc-prev-btn');
  if(fcIdx>0) prev.classList.remove('hidden'); else prev.classList.add('hidden');
  fcTapState=0;
}
function renderFC(){
  const a=fcList[fcIdx];
  const accent=ACCENTS[fcIdx%ACCENTS.length];
  document.getElementById('fc-progress').textContent=(fcIdx+1)+' / '+fcList.length;
  document.getElementById('fc-word').textContent=a.word;
  document.getElementById('fc-word').style.color=accent;
  ['fc-s1','fc-s2','fc-s3'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.textContent=a.sentences[i];
    el.style.borderTopColor=accent;
  });
  // ← both use same image (no suffix)
  setImg(document.getElementById('fc-img1'),document.getElementById('fc-img1-ph'),a.id);
  setImg(document.getElementById('fc-img2'),document.getElementById('fc-img2-ph'),a.id);
  resetSlide();
  updateDots();
  if(fcMode==='learn11'){
    document.getElementById('fc-word').style.display='block';
    document.getElementById('fc-slide').classList.add('word-only');
  } else {
    const slide=document.getElementById('fc-slide');
    const wordEl=document.getElementById('fc-word');
    document.getElementById('fc-img1-wrap').after(wordEl);
    document.getElementById('fc-img1-wrap').style.display='block';
  }
}
function fcTap(){
  fcTapState++;
  if(fcTapState>=1) document.getElementById('fc-prev-btn').classList.remove('hidden');
  if(fcMode==='learn11'){
    if(fcTapState===1){document.getElementById('fc-slide').classList.remove('word-only');document.getElementById('fc-img1-wrap').style.display='block';}
    else if(fcTapState===2){document.getElementById('fc-img1-wrap').style.display='none';document.getElementById('fc-img2-wrap').style.display='block';document.getElementById('fc-s1').classList.add('show');}
    else if(fcTapState===3){document.getElementById('fc-s2').classList.add('show');}
    else if(fcTapState===4){document.getElementById('fc-s3').classList.add('show');document.getElementById('fc-hint').textContent='Tap for next →';}
    else{fcAdvance();}
  } else {
    if(fcTapState===1){document.getElementById('fc-word').style.display='block';}
    else if(fcTapState===2){
      const slide=document.getElementById('fc-slide');
      slide.insertBefore(document.getElementById('fc-word'),document.getElementById('fc-s1'));
      document.getElementById('fc-img1-wrap').style.display='none';
      document.getElementById('fc-img2-wrap').style.display='block';
      document.getElementById('fc-s1').classList.add('show');
    }
    else if(fcTapState===3){document.getElementById('fc-s2').classList.add('show');}
    else if(fcTapState===4){document.getElementById('fc-s3').classList.add('show');document.getElementById('fc-hint').textContent='Tap for next →';}
    else{fcAdvance();}
  }
}
function fcAdvance(){
  fcIdx++;
  if(fcIdx>=fcList.length){
    document.getElementById('fc-slide').style.display='none';
    document.getElementById('fc-finish').style.display='block';
    document.querySelector('.fc-nav-row').style.display='none';
  } else {renderFC();}
}
function fcPrev(){
  if(fcIdx<=0) return;
  fcIdx--;
  renderFC();
  document.getElementById('fc-slide').classList.remove('word-only');
  document.getElementById('fc-word').style.display='block';
  document.getElementById('fc-img1-wrap').style.display='none';
  document.getElementById('fc-img2-wrap').style.display='block';
  ['fc-s1','fc-s2','fc-s3'].forEach(id=>document.getElementById(id).classList.add('show'));
  document.getElementById('fc-hint').textContent='tap to continue';
  fcTapState=4;
}
function restartFC(){
  fcIdx=0; buildDots();
  document.getElementById('fc-slide').style.display='flex';
  document.getElementById('fc-finish').style.display='none';
  document.querySelector('.fc-nav-row').style.display='flex';
  renderFC();
}

// ══════════════════════════════════════
// MEMORY
// ══════════════════════════════════════
function initMemory(){
  const words=setWords();
  const status=document.getElementById('mem-status');
  const leftCol=document.getElementById('mem-col-left');
  const rightCol=document.getElementById('mem-col-right');
  leftCol.innerHTML=''; rightCol.innerHTML='';
  document.getElementById('mem-finish').style.display='none';
  status.textContent='Find all the pairs! 🧠';
  const leftWords=shuffle([...words]);
  const rightWords=shuffle([...words]);
  let flipped=[],matched=0,lock=false;
  const total=words.length;

  function makeCard(a,num,side){
    const card=document.createElement('div');
    card.className='mem-card'; card.dataset.id=a.id; card.dataset.side=side;
    const em=EMOJIS[a.id]||'❓';
    const safeEm=em.replace(/'/g,"\\'");
    // ← uses word.jpg only (no suffix)
    card.innerHTML='<div class="mem-inner"><div class="mem-front">'+num+'</div><div class="mem-back">'
      +'<img src="'+imgSrc(a.id)+'" alt="'+a.word+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.fontSize=\'1.8rem\';this.nextElementSibling.textContent=\''+safeEm+'\'">'
      +'<div class="mem-name">'+a.word+'</div></div></div>';
    card.addEventListener('click',()=>{
      if(lock||card.classList.contains('flipped')||card.classList.contains('matched'))return;
      if(flipped.length===1&&flipped[0].side===side){flipped[0].card.classList.remove('flipped');flipped=[];}
      card.classList.add('flipped');
      flipped.push({card,id:a.id,side});
      if(flipped.length===2){
        lock=true;
        if(flipped[0].id===flipped[1].id){
          flipped[0].card.classList.add('matched'); flipped[1].card.classList.add('matched');
          matched++; flipped=[]; lock=false;
          status.textContent=matched===total?'🎉 All matched!':'✅ '+matched+' / '+total+' found!';
          if(matched===total){setTimeout(()=>{document.getElementById('mem-finish-msg').textContent='You found all '+total+' pairs! 🎉';document.getElementById('mem-finish').style.display='block';},600);}
        } else {
          setTimeout(()=>{flipped[0].card.classList.remove('flipped');flipped[1].card.classList.remove('flipped');flipped=[];lock=false;},800);
        }
      }
    });
    return card;
  }
  leftWords.forEach((a,i)=>leftCol.appendChild(makeCard(a,i+1,'left')));
  rightWords.forEach((a,i)=>rightCol.appendChild(makeCard(a,i+1,'right')));
  lock=true;
  document.querySelectorAll('.mem-card').forEach(c=>c.classList.add('flipped'));
  setTimeout(()=>{document.querySelectorAll('.mem-card:not(.matched)').forEach(c=>c.classList.remove('flipped'));lock=false;},2000);
}

// ══════════════════════════════════════
// SUMMARY
// ══════════════════════════════════════
const PER_PAGE=5;
const ACCENT_BORDERS=['#7C3AED','#FF6B6B','#3B82F6','#6BCB77','#FF9F43','#FFD93D','#7C3AED','#FF6B6B','#3B82F6','#6BCB77','#FF9F43'];

function renderSummary(){
  const words=setWords();
  const totalPages=Math.ceil(words.length/PER_PAGE);
  sumPage=Math.max(0,Math.min(sumPage,totalPages-1));
  const slice=words.slice(sumPage*PER_PAGE,(sumPage+1)*PER_PAGE);
  document.getElementById('sum-page-info').textContent='Page '+(sumPage+1)+' / '+totalPages;
  document.getElementById('summary-progress').textContent=(sumPage*PER_PAGE+1)+'–'+(sumPage*PER_PAGE+slice.length)+' of '+words.length;
  document.getElementById('sum-prev').style.visibility=sumPage===0?'hidden':'visible';
  document.getElementById('sum-next').style.visibility=sumPage===totalPages-1?'hidden':'visible';
  const grid=document.getElementById('summary-grid');
  grid.innerHTML='';
  slice.forEach((a,i)=>{
    const globalIdx=sumPage*PER_PAGE+i;
    const card=document.createElement('div');
    card.className='summary-card';
    card.style.borderLeftColor=ACCENT_BORDERS[globalIdx%ACCENT_BORDERS.length];
    const aEmoji=EMOJIS[a.id]||'❓';
    // ← uses word.jpg only
    card.innerHTML='<img src="'+imgSrc(a.id)+'" alt="'+a.word+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
      +'<div class="s-ph" style="display:none;">'+aEmoji+'</div>'
      +'<div class="s-name">'+a.word+'</div>';
    grid.appendChild(card);
  });
}
function summaryPage(dir){sumPage+=dir;renderSummary();}

(function(){
  const cv=document.getElementById('bubble-canvas');
  const cx=cv.getContext('2d');
  const cols=['#7C3AED','#FF6B6B','#3B82F6','#6BCB77','#FF9F43','#FFD93D'];
  let bs=[];
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<14;i++){const r=22+Math.random()*48;bs.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r,dx:(Math.random()-.5)*.55,dy:(Math.random()-.5)*.55,col:cols[i%cols.length]});}
  function draw(){
    cx.clearRect(0,0,cv.width,cv.height);
    bs.forEach(b=>{
      b.x+=b.dx;b.y+=b.dy;
      if(b.x<-b.r)b.x=cv.width+b.r;if(b.x>cv.width+b.r)b.x=-b.r;
      if(b.y<-b.r)b.y=cv.height+b.r;if(b.y>cv.height+b.r)b.y=-b.r;
      cx.globalAlpha=.12;cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fillStyle=b.col;cx.fill();
      cx.globalAlpha=.28;cx.beginPath();cx.arc(b.x-b.r*.28,b.y-b.r*.28,b.r*.2,0,Math.PI*2);cx.fillStyle='#fff';cx.fill();
      cx.globalAlpha=1;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ══════════════════════════════════════
// VOCABINDER — uses word.jpg only
// ══════════════════════════════════════
let vcDeck=[],vcIdx=0,vcCorrect=0,vcWrong=0,vcLocked=false,vcChoices=[];
let vcDragX=0,vcDragging=false,vcStartX=0;

function showVocabinder(){
  showScreen('voca-screen');
  document.getElementById('bottom-nav').classList.remove('visible');
  vcRestart();
}
function vcRestart(){
  vcDeck=shuffle([...WORDS]);
  vcIdx=0;vcCorrect=0;vcWrong=0;vcLocked=false;
  document.getElementById('vc-comp').classList.remove('on');
  document.getElementById('vc-game').style.display='block';
  document.getElementById('vc-total').textContent=vcDeck.length;
  vcRender();
}
function vcRender(){
  if(vcIdx>=vcDeck.length){vcShowComp();return;}
  const item=vcDeck[vcIdx];
  const pool=WORDS.filter(a=>a.id!==item.id);
  const wrong=pool[Math.floor(Math.random()*pool.length)];
  vcChoices=shuffle([item,wrong]);
  const card=document.getElementById('vc-card');
  card.style.transition='none';
  card.style.transform='translateX(0) rotate(0deg)';
  card.style.opacity='1';
  card.classList.remove('correct-flash','wrong-flash');
  card.innerHTML='';
  const vcImg=document.createElement('img');
  vcImg.src=imgSrc(item.id); // ← word.jpg only
  vcImg.alt=item.word;
  vcImg.style.cssText='width:200px;height:200px;object-fit:cover;border-radius:18px;';
  vcImg.onerror=()=>{vcImg.remove();const sp=document.createElement('span');sp.style.fontSize='5rem';sp.textContent=EMOJIS[item.id]||'❓';card.appendChild(sp);};
  card.appendChild(vcImg);
  document.getElementById('vc-a-txt').textContent=vcChoices[0].word;
  document.getElementById('vc-b-txt').textContent=vcChoices[1].word;
  document.getElementById('vc-btn-a').classList.remove('flash-correct','flash-wrong');
  document.getElementById('vc-btn-b').classList.remove('flash-correct','flash-wrong');
  document.getElementById('vc-peek-l').textContent=vcChoices[0].word;
  document.getElementById('vc-peek-r').textContent=vcChoices[1].word;
  document.getElementById('vc-peek-l').style.opacity=0;
  document.getElementById('vc-peek-r').style.opacity=0;
  vcUpdateHUD(); vcLocked=false; vcSetupDrag();
}
function vcUpdateHUD(){
  document.getElementById('vc-correct').textContent=vcCorrect;
  document.getElementById('vc-wrong').textContent=vcWrong;
  document.getElementById('vc-done').textContent=vcIdx;
  document.getElementById('vc-prog').style.width=(vcDeck.length?(vcIdx/vcDeck.length)*100:0)+'%';
}
function vcPick(side){if(vcLocked)return;vcResolve(vcChoices[side].id===vcDeck[vcIdx].id,side);}
function vcResolve(isOk,side){
  if(vcLocked)return;vcLocked=true;
  const card=document.getElementById('vc-card');
  const btn=side===0?document.getElementById('vc-btn-a'):document.getElementById('vc-btn-b');
  if(isOk){vcCorrect++;card.classList.add('correct-flash');btn.classList.add('flash-correct');setTimeout(()=>vcFlyOut(side===0?'left':'right'),200);}
  else{vcWrong++;card.classList.add('wrong-flash');btn.classList.add('flash-wrong');setTimeout(()=>vcFlyOut(side===0?'left':'right'),200);}
  setTimeout(()=>{vcIdx++;vcRender();},isOk?700:900);
}
function vcFlyOut(dir){
  const card=document.getElementById('vc-card');
  card.style.transition='transform .42s ease, opacity .38s';
  card.style.transform='translateX('+(dir==='right'?380:-380)+'px) rotate('+(dir==='right'?15:-15)+'deg)';
  card.style.opacity='0';
}
function vcShowComp(){
  document.getElementById('vc-game').style.display='none';
  const comp=document.getElementById('vc-comp');comp.classList.add('on');
  document.getElementById('vc-comp-stats').textContent='✅ '+vcCorrect+' correct  ❌ '+vcWrong+' wrong — all '+vcDeck.length+' words done!';
}
function vcSetupDrag(){
  const card=document.getElementById('vc-card');
  card.onmousedown=e=>vcStartDrag(e.clientX);
  card.ontouchstart=e=>{e.preventDefault();vcStartDrag(e.touches[0].clientX);};
}
function vcStartDrag(x){
  if(vcLocked)return;
  vcDragging=true;vcStartX=x;vcDragX=0;
  const card=document.getElementById('vc-card');
  function onMove(cx){
    if(!vcDragging)return;
    vcDragX=cx-vcStartX;
    card.style.transition='none';
    card.style.transform='translateX('+vcDragX+'px) rotate('+(vcDragX*.06)+'deg)';
    const t=40;
    document.getElementById('vc-peek-l').style.opacity=vcDragX<-t?Math.min((-vcDragX-t)/60,1):0;
    document.getElementById('vc-peek-r').style.opacity=vcDragX>t?Math.min((vcDragX-t)/60,1):0;
  }
  function onUp(){
    if(!vcDragging)return;vcDragging=false;
    document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);
    document.removeEventListener('touchmove',tm);document.removeEventListener('touchend',tu);
    if(vcDragX>90)vcResolve(vcChoices[1].id===vcDeck[vcIdx].id,1);
    else if(vcDragX<-90)vcResolve(vcChoices[0].id===vcDeck[vcIdx].id,0);
    else{card.style.transition='transform .3s ease';card.style.transform='translateX(0) rotate(0)';document.getElementById('vc-peek-l').style.opacity=0;document.getElementById('vc-peek-r').style.opacity=0;}
    vcDragX=0;
  }
  const mm=e=>onMove(e.clientX);const mu=()=>onUp();
  const tm=e=>{e.preventDefault();onMove(e.touches[0].clientX);};const tu=()=>onUp();
  document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  document.addEventListener('touchmove',tm,{passive:false});document.addEventListener('touchend',tu);
}

// ══════════════════════════════════════
// SPELLING — uses word.jpg only
// ══════════════════════════════════════
let spellList=[],spellIdx=0,spellAnswered=false;

function genMisspelling(word){
  const ops=['swap','drop','doubleVowel','replaceVowel','insert'];
  const vowels='aeiou';
  const letters='abcdefghijklmnoprstw';
  let result=word;
  const op=ops[Math.floor(Math.random()*ops.length)];
  if(op==='swap'&&word.length>2){const i=1+Math.floor(Math.random()*(word.length-2));result=word.slice(0,i)+word[i+1]+word[i]+word.slice(i+2);}
  else if(op==='drop'&&word.length>3){const i=1+Math.floor(Math.random()*(word.length-2));result=word.slice(0,i)+word.slice(i+1);}
  else if(op==='doubleVowel'){const vIdx=[...word].map((c,i)=>vowels.includes(c)?i:-1).filter(i=>i>0);if(vIdx.length){const i=vIdx[Math.floor(Math.random()*vIdx.length)];result=word.slice(0,i)+word[i]+word.slice(i);}else result=word.slice(0,1)+word[0]+word.slice(1);}
  else if(op==='replaceVowel'){const vIdx=[...word].map((c,i)=>vowels.includes(c)?i:-1).filter(i=>i>=0);if(vIdx.length){const i=vIdx[Math.floor(Math.random()*vIdx.length)];const nv=vowels.replace(word[i],'');result=word.slice(0,i)+nv[Math.floor(Math.random()*nv.length)]+word.slice(i+1);}else result=word+'e';}
  else{const i=1+Math.floor(Math.random()*(word.length-1));result=word.slice(0,i)+letters[Math.floor(Math.random()*letters.length)]+word.slice(i);}
  return result===word?word.slice(0,-1)+(word.slice(-1)==='e'?'ing':'e'):result;
}
function genMisspellings(word,count){
  const results=new Set();let attempts=0;
  while(results.size<count&&attempts<50){const m=genMisspelling(word);if(m!==word)results.add(m);attempts++;}
  while(results.size<count){results.add(word+'s');}
  return [...results].slice(0,count);
}
function getSpellWords(w){
  if(w.spellWords)return w.spellWords.map(sw=>({display:sw,correct:sw}));
  return [{display:w.id,correct:w.id}];
}
function initSpell(){
  const base=setWords();
  spellList=shuffle(base.flatMap(w=>getSpellWords(w).map(sw=>({...w,spellTarget:sw.correct,spellDisplay:sw.display}))));
  spellIdx=0;spellAnswered=false;
  document.getElementById('spell-finish').style.display='none';
  document.getElementById('spell-main').style.display='block';
  renderSpell();
}
function renderSpell(){
  if(spellIdx>=spellList.length){document.getElementById('spell-main').style.display='none';document.getElementById('spell-finish').style.display='block';return;}
  document.getElementById('spell-progress').textContent=(spellIdx+1)+' / '+spellList.length;
  const a=spellList[spellIdx];spellAnswered=false;
  const correct=a.spellTarget;
  const wrong2=genMisspellings(correct,2);
  const choices=shuffle([correct,...wrong2]);
  const aEmoji=EMOJIS[a.id]||'❓';
  const choicesHTML=choices.map(c=>{
    const safe=c.replace(/'/g,"\\'");const safeC=correct.replace(/'/g,"\\'");
    return '<button class="spell-choice" onclick="spellCheck(this,\''+safe+'\',\''+safeC+'\')">'+c+'</button>';
  }).join('');
  // ← uses word.jpg only
  document.getElementById('spell-main').innerHTML=
    '<div class="spell-card">'
    +'<img class="spell-img" src="'+imgSrc(a.id)+'" alt="'+a.id+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
    +'<div class="spell-img-ph">'+aEmoji+'</div>'
    +'<div class="spell-prompt">Which spelling is correct?</div>'
    +'<div class="spell-choices">'+choicesHTML+'</div>'
    +'<button class="spell-next-btn" id="spell-next-btn" onclick="spellNext()">Next →</button>'
    +'</div>';
}
function spellCheck(btn,chosen,correct){
  if(spellAnswered)return;
  if(chosen===correct){spellAnswered=true;document.querySelectorAll('.spell-choice').forEach(b=>b.disabled=true);btn.classList.add('correct-spell');document.getElementById('spell-next-btn').classList.add('show');}
  else{btn.classList.add('wrong-spell');setTimeout(()=>btn.classList.remove('wrong-spell'),500);}
}
function spellNext(){spellIdx++;renderSpell();}
