<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Friends — Learn English</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --purple:#7C3AED;--coral:#FF6B6B;--blue:#3B82F6;
  --green:#6BCB77;--orange:#FF9F43;--yellow:#FFD93D;
  --bg:#FEF9F0;--text:#2D2D2D;--muted:#888;
}
body{font-family:'Nunito',sans-serif;font-weight:800;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
#rainbow-bar{position:fixed;top:0;left:0;right:0;height:7px;background:linear-gradient(90deg,#FF6B6B,#FF9F43,#FFD93D,#6BCB77,#3B82F6,#7C3AED,#FF6B6B);z-index:1000;}
#bubble-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#app{position:relative;z-index:1;padding-top:14px;min-height:100vh;}

/* SCREENS */
.screen{display:none;max-width:480px;margin:0 auto;padding:16px 16px 40px;}
.screen.active{display:block;}

/* ── HOME ── */
#home-screen{padding-top:40px;text-align:center;}
.home-title{font-family:'Fredoka One',cursive;font-size:2.6rem;color:var(--purple);line-height:1.1;margin-bottom:6px;}
.home-sub{font-size:.95rem;color:var(--muted);margin-bottom:40px;}
.home-learn-btns{display:flex;flex-direction:column;gap:16px;max-width:340px;margin:0 auto 32px;}
.home-learn-btn{border:none;border-radius:22px;padding:22px 24px;display:flex;align-items:center;gap:18px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.12);transition:transform .18s,box-shadow .18s;width:100%;text-align:left;color:#fff;}
.home-learn-btn:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.18);}
.home-learn-btn:nth-child(1){background:var(--blue);}
.home-learn-btn:nth-child(2){background:var(--coral);}
.home-learn-btn .hlb-icon{font-size:2.2rem;flex-shrink:0;}
.home-learn-btn .hlb-name{font-family:'Fredoka One',cursive;font-size:1.25rem;display:block;}
.home-learn-btn .hlb-desc{font-size:.8rem;opacity:.85;}

/* ── BOTTOM NAV (inner screens) ── */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #eee;z-index:500;height:62px;}
#bottom-nav.visible{display:flex;}
.bnav-btn{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;color:var(--muted);padding:4px 2px;transition:all .18s;}
.bnav-btn .bn-icon{font-size:17px;line-height:1;}
.bnav-btn.active{color:#fff;}
.bnav-btn.set-btn.active{background:var(--blue);}
.bnav-btn.set2-btn.active{background:var(--coral);}
.bnav-btn.wf-btn.active{background:var(--purple);}
.bnav-btn.pf-btn.active{background:var(--green);}
.bnav-btn.match-btn.active{background:var(--orange);}
.bnav-btn.fill-btn.active{background:var(--yellow);color:var(--text)!important;}

/* screens need bottom padding when nav visible */
.screen.has-nav{padding-bottom:72px;}

/* ── FLASHCARD ── */
#flashcard-screen{padding-top:14px;}
.fc-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.back-btn{background:none;border:2px solid #ddd;border-radius:50px;padding:7px 16px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.86rem;color:var(--muted);cursor:pointer;transition:all .15s;}
.back-btn:hover{border-color:var(--text);color:var(--text);}
.fc-progress{font-size:.83rem;color:var(--muted);}

/* full-screen tap zone */
.fc-slide{display:flex;flex-direction:column;align-items:center;padding:6px 0 28px;cursor:pointer;text-align:center;user-select:none;min-height:calc(100vh - 100px);}
.fc-word-badge{font-family:'Fredoka One',cursive;font-size:3.2rem;margin-bottom:16px;}
/* word-only state: push down to visual centre */
.fc-slide.word-only{justify-content:center;}
.fc-slide.word-only .fc-word-badge{font-size:4rem;margin-bottom:0;}

.fc-img-wrap{width:220px;height:220px;margin:0 auto 16px;}
.fc-img{width:220px;height:220px;object-fit:cover;border-radius:22px;box-shadow:0 8px 32px rgba(0,0,0,.13);display:block;}
.fc-img-ph{width:220px;height:220px;border-radius:22px;display:none;align-items:center;justify-content:center;font-size:5.5rem;background:rgba(0,0,0,.05);}

/* sentence box — styled exactly like prepositions app */
.sentence-box{
  background:rgba(255,255,255,.92);
  border-radius:20px;
  padding:15px 22px;
  font-size:1.12rem;
  font-weight:800;
  box-shadow:0 4px 24px rgba(0,0,0,.11);
  max-width:340px;
  width:100%;
  line-height:1.6;
  visibility:hidden;
  opacity:0;
  transform:translateY(14px);
  transition:opacity .4s,transform .4s;
  margin:0 auto 10px;
  border-top:5px solid var(--purple);
  text-align:center;
}
.sentence-box.show{visibility:visible;opacity:1;transform:translateY(0);}

.fc-tap-hint{font-size:.8rem;color:var(--muted);margin-top:12px;animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}

.dot-row{display:flex;gap:8px;justify-content:center;margin-top:14px;}
.dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:all .3s;}
.dot.active{background:var(--purple);transform:scale(1.3);}
.dot.done{background:#A78BFA;}

/* finish card */
.finish-card{background:rgba(255,255,255,.95);border-radius:26px;box-shadow:0 6px 28px rgba(0,0,0,.1);text-align:center;padding:38px 26px;animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.trophy{font-size:3.8rem;display:inline-block;animation:bounce 1s infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-12px);}}
.finish-title{font-family:'Fredoka One',cursive;font-size:1.75rem;margin:10px 0 5px;color:var(--purple);}
.finish-sub{color:var(--muted);font-size:.92rem;margin-bottom:20px;}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.pill-btn{border:none;border-radius:50px;padding:13px 28px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.97rem;cursor:pointer;transition:transform .15s;color:#fff;}
.pill-btn:hover{transform:scale(1.05);}
.btn-green{background:var(--green);}
.btn-orange{background:var(--orange);}
.btn-purple{background:var(--purple);}

/* ── MATCH ── */
#match-screen{padding-top:14px;}
.match-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.match-img-card{background:rgba(255,255,255,.9);border-radius:15px;padding:8px;text-align:center;cursor:pointer;border:3px solid transparent;transition:all .22s;box-shadow:0 3px 12px rgba(0,0,0,.08);}
.match-img-card img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:9px;display:block;}
.match-img-card .m-ph{font-size:2.2rem;padding:14px 0;display:block;}
.match-img-card.selected{border-color:var(--blue);transform:scale(1.05);}
.match-img-card.correct{border-color:var(--green);opacity:.5;pointer-events:none;}
.match-img-card.wrong{animation:shake .4s;}
.match-words{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.match-word-pill{border:2px solid transparent;border-radius:50px;padding:9px 17px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.92rem;background:rgba(255,255,255,.9);box-shadow:0 3px 10px rgba(0,0,0,.09);cursor:pointer;color:var(--text);transition:all .2s;}
.match-word-pill.selected{border-color:var(--blue);background:rgba(59,130,246,.1);}
.match-word-pill.correct{background:var(--green);color:#fff;pointer-events:none;}
.match-word-pill.wrong{animation:shake .4s;border-color:var(--coral);}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

/* ── FILL ── */
#fill-screen{padding-top:14px;}
.fill-card{background:rgba(255,255,255,.92);border-radius:22px;box-shadow:0 5px 22px rgba(0,0,0,.09);padding:24px 18px;text-align:center;border-top:5px solid var(--orange);}
.fill-img{width:155px;height:155px;object-fit:cover;border-radius:14px;margin:0 auto 14px;display:block;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.fill-img-ph{width:155px;height:155px;border-radius:14px;margin:0 auto 14px;display:none;align-items:center;justify-content:center;font-size:3.8rem;background:rgba(0,0,0,.05);}
.fill-sentence{font-size:1.12rem;line-height:1.7;margin-bottom:18px;}
.fill-blank{display:inline-block;border-bottom:3px solid var(--blue);min-width:88px;padding:0 8px;font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--blue);transition:all .3s;}
.fill-blank.correct{color:var(--green);border-color:var(--green);}
.fill-choices{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-bottom:10px;}
.fill-choice{border:2px solid transparent;border-radius:50px;padding:10px 20px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.94rem;background:rgba(255,255,255,.9);box-shadow:0 3px 12px rgba(0,0,0,.09);cursor:pointer;color:var(--text);transition:all .2s;}
.fill-choice:hover:not(:disabled){border-color:var(--blue);}
.fill-choice.correct-choice{background:var(--green);color:#fff;border-color:var(--green);}
.fill-choice.wrong-choice{animation:shake .4s;border-color:var(--coral);}
.fill-choice:disabled{opacity:.6;cursor:default;}
.fill-feedback{min-height:20px;font-size:.88rem;margin-bottom:8px;}
.fill-feedback.ok{color:var(--green);}
.fill-feedback.no{color:var(--coral);}
.fill-next-btn{display:none;background:var(--green);color:#fff;border:none;border-radius:50px;padding:12px 32px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.97rem;cursor:pointer;transition:transform .15s;margin-top:2px;}
.fill-next-btn.show{display:inline-block;}
.fill-next-btn:hover{transform:scale(1.05);}

/* ── MEMORY ── */
#memory-screen{padding-top:14px;}
.mem-status{text-align:center;font-size:.9rem;color:var(--muted);margin-bottom:12px;}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:420px;margin:0 auto 14px;}
.mem-card{aspect-ratio:1;perspective:600px;cursor:pointer;}
.mem-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.34,1.2,.64,1);border-radius:14px;}
.mem-card.flipped .mem-inner{transform:rotateY(180deg);}
.mem-front,.mem-back{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.12);}
.mem-front{background:linear-gradient(135deg,var(--purple),#5b21b6);font-family:'Fredoka One',cursive;font-size:1.4rem;color:#fff;}
.mem-back{background:#fff;transform:rotateY(180deg);overflow:hidden;border:3px solid #fff;}
.mem-back img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
.mem-card.matched .mem-inner{box-shadow:0 0 0 3px var(--green);}
.mem-card.matched .mem-front{background:linear-gradient(135deg,var(--green),#15803d);}

#footer{text-align:center;padding:22px 16px 10px;font-size:.76rem;color:var(--muted);position:relative;z-index:1;}
</style>
</head>
<body>
<div id="rainbow-bar"></div>
<canvas id="bubble-canvas"></canvas>
<div id="app">

<!-- ═══ HOME ═══ -->
<div id="home-screen" class="screen active">
  <div class="home-title">🐾 Animal Friends</div>
  <div class="home-sub">Choose how you want to learn!</div>
  <div class="home-learn-btns">
    <button class="home-learn-btn" onclick="startActivity('learn11')">
      <span class="hlb-icon">📖</span>
      <span class="hlb-info">
        <span class="hlb-name">Word First</span>
        <span class="hlb-desc">See the word → tap to reveal picture &amp; sentences</span>
      </span>
    </button>
    <button class="home-learn-btn" onclick="startActivity('learn12')">
      <span class="hlb-icon">🖼️</span>
      <span class="hlb-info">
        <span class="hlb-name">Picture First</span>
        <span class="hlb-desc">See the picture → tap to reveal word &amp; sentences</span>
      </span>
    </button>
  </div>
  <div id="footer">Pang made with ❤️ for kids learning English</div>
</div>

<!-- ═══ BOTTOM NAV (shown inside activities) ═══ -->
<div id="bottom-nav">
  <button class="bnav-btn set-btn"  id="bn-s1"    onclick="bnSwitch(0,'learn11')"><span class="bn-icon">🐾</span>Set 1</button>
  <button class="bnav-btn set2-btn" id="bn-s2"    onclick="bnSwitch(1,'learn11')"><span class="bn-icon">🌿</span>Set 2</button>
  <button class="bnav-btn wf-btn"   id="bn-wf"    onclick="bnActivity('learn11')"><span class="bn-icon">📖</span>Word</button>
  <button class="bnav-btn pf-btn"   id="bn-pf"    onclick="bnActivity('learn12')"><span class="bn-icon">🖼️</span>Picture</button>
  <button class="bnav-btn match-btn" id="bn-match" onclick="bnActivity('match')"><span class="bn-icon">🎯</span>Match</button>
  <button class="bnav-btn fill-btn"  id="bn-fill"  onclick="bnActivity('fill')"><span class="bn-icon">✏️</span>Fill</button>
</div>

<!-- ═══ FLASHCARD ═══ -->
<div id="flashcard-screen" class="screen">
  <div class="fc-topbar">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div style="font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--purple);" id="fc-mode-label"></div>
    <div class="fc-progress" id="fc-progress"></div>
  </div>

  <div class="fc-slide" id="fc-slide" onclick="fcTap()">
    <div class="fc-word-badge" id="fc-word" style="display:none;"></div>

    <div class="fc-img-wrap" id="fc-img1-wrap" style="display:none;">
      <img id="fc-img1" class="fc-img" src="" alt="">
      <div id="fc-img1-ph" class="fc-img-ph"></div>
    </div>

    <div class="fc-img-wrap" id="fc-img2-wrap" style="display:none;">
      <img id="fc-img2" class="fc-img" src="" alt="">
      <div id="fc-img2-ph" class="fc-img-ph"></div>
    </div>

    <div class="sentence-box" id="fc-s1"></div>
    <div class="sentence-box" id="fc-s2"></div>
    <div class="sentence-box" id="fc-s3"></div>

    <div class="fc-tap-hint" id="fc-hint">Tap to continue →</div>
    <div class="dot-row" id="fc-dots"></div>
  </div>

  <div id="fc-finish" style="display:none;">
    <div class="finish-card">
      <div class="trophy">🏆</div>
      <div class="finish-title">Great Job!</div>
      <div class="finish-sub">You finished all the cards!</div>
      <div class="btn-row">
        <button class="pill-btn btn-orange" onclick="restartFC()">Try Again</button>
        <button class="pill-btn btn-purple" onclick="goHome()">Menu</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ MATCH ═══ -->
<div id="match-screen" class="screen">
  <div class="fc-topbar">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div style="font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--green);">🎯 Match</div>
    <div style="font-size:.83rem;color:var(--muted);" id="match-score-top">0 matched</div>
  </div>
  <div id="match-main">
    <div class="match-grid" id="match-grid"></div>
    <div class="match-words" id="match-words"></div>
  </div>
  <div id="match-finish" style="display:none;">
    <div class="finish-card">
      <div class="trophy">🏆</div>
      <div class="finish-title">All Matched!</div>
      <div class="finish-sub" id="match-finish-msg"></div>
      <div class="btn-row">
        <button class="pill-btn btn-orange" onclick="initMatch()">Try Again</button>
        <button class="pill-btn btn-purple" onclick="goHome()">Menu</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ MEMORY ═══ -->
<div id="memory-screen" class="screen">
  <div class="fc-topbar">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div style="font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--purple);">🧠 Memory</div>
    <div class="mem-status" id="mem-status" style="margin:0;"></div>
  </div>
  <div class="mem-grid" id="mem-grid"></div>
  <div id="mem-finish" style="display:none;">
    <div class="finish-card">
      <div class="trophy">🏆</div>
      <div class="finish-title">Amazing!</div>
      <div class="finish-sub" id="mem-finish-msg"></div>
      <div class="btn-row">
        <button class="pill-btn btn-purple" onclick="initMemory()">Play Again</button>
        <button class="pill-btn btn-orange" onclick="goHome()">Menu</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ FILL ═══ -->
<div id="fill-screen" class="screen">
  <div class="fc-topbar">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div style="font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--orange);">✏️ Fill in the Blank</div>
    <div class="fc-progress" id="fill-progress"></div>
  </div>
  <div id="fill-main"></div>
  <div id="fill-finish" style="display:none;">
    <div class="finish-card">
      <div class="trophy">🏆</div>
      <div class="finish-title">Amazing!</div>
      <div class="finish-sub">You answered all the questions!</div>
      <div class="btn-row">
        <button class="pill-btn btn-orange" onclick="initFill()">Play Again</button>
        <button class="pill-btn btn-purple" onclick="goHome()">Menu</button>
      </div>
    </div>
  </div>
</div>

</div><!-- #app -->

<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const EMOJIS={cat:'🐱',dog:'🐶',fish:'🐟',bird:'🐦',elephant:'🐘',giraffe:'🦒',tiger:'🐯',zebra:'🦓',monkey:'🐒',crocodile:'🐊',snake:'🐍',frog:'🐸',cow:'🐄',goat:'🐐',sheep:'🐑',horse:'🐴','polar bear':'🐻‍❄️',hippo:'🦛',parrot:'🦜',rhino:'🦏'};
const ACCENTS=['#7C3AED','#FF6B6B','#3B82F6','#6BCB77','#FF9F43','#FFD93D','#7C3AED','#FF6B6B','#3B82F6','#6BCB77'];

const ANIMALS=[
  {id:'cat',      word:'Cat',        set:0, sentences:['This is a cat.','The cat is small and soft.','The cat likes milk.'],                                       fillQ:'The {blank} is drinking milk.'},
  {id:'dog',      word:'Dog',        set:0, sentences:['This is a dog.','The dog likes to run.','The dog is a good friend.'],                                      fillQ:'The {blank} is running in the park.'},
  {id:'fish',     word:'Fish',       set:0, sentences:['This is a fish.','The fish swims in water.','The fish has fins.'],                                         fillQ:'The {blank} is swimming in the water.'},
  {id:'bird',     word:'Bird',       set:0, sentences:['This is a bird.','The bird can fly.','The bird has wings.'],                                               fillQ:'The {blank} is flying in the sky.'},
  {id:'elephant', word:'Elephant',   set:0, sentences:['This is an elephant.','The elephant is big and gray.','The elephant has a long trunk.'],                    fillQ:'The {blank} is walking slowly.'},
  {id:'giraffe',  word:'Giraffe',    set:0, sentences:['This is a giraffe.','The giraffe has a long neck.','The giraffe eats leaves.'],                            fillQ:'The {blank} is eating leaves.'},
  {id:'tiger',    word:'Tiger',      set:0, sentences:['This is a tiger.','The tiger has black stripes.','The tiger is strong.'],                                  fillQ:'The {blank} is looking for food.'},
  {id:'zebra',    word:'Zebra',      set:0, sentences:['This is a zebra.','The zebra is black and white.','The zebra can run fast.'],                              fillQ:'The {blank} is running fast.'},
  {id:'monkey',   word:'Monkey',     set:0, sentences:['This is a monkey.','The monkey likes bananas.','The monkey can climb trees.'],                             fillQ:'The {blank} is eating a banana.'},
  {id:'crocodile',word:'Crocodile',  set:0, sentences:['This is a crocodile.','The crocodile lives in water.','The crocodile has big teeth.'],                     fillQ:'The {blank} is swimming in the river.'},
  {id:'snake',    word:'Snake',      set:1, sentences:['This is a snake.','The snake is long.','The snake has no legs.'],                                          fillQ:'The {blank} is moving on the ground.'},
  {id:'frog',     word:'Frog',       set:1, sentences:['This is a frog.','The frog can jump.','The frog is green.'],                                              fillQ:'The {blank} is jumping.'},
  {id:'cow',      word:'Cow',        set:1, sentences:['This is a cow.','The cow gives milk.','The cow eats grass.'],                                              fillQ:'The {blank} is eating grass.'},
  {id:'goat',     word:'Goat',       set:1, sentences:['This is a goat.','The goat eats grass.','The goat can climb.'],                                           fillQ:'The {blank} is climbing a rock.'},
  {id:'sheep',    word:'Sheep',      set:1, sentences:['This is a sheep.','The sheep has white wool.','The sheep lives on a farm.'],                               fillQ:'The {blank} is standing on the farm.'},
  {id:'horse',    word:'Horse',      set:1, sentences:['This is a horse.','The horse can run fast.','The horse is big.'],                                          fillQ:'The {blank} is running fast.'},
  {id:'polar bear',word:'Polar Bear',set:1, sentences:['This is a polar bear.','The polar bear is white.','The polar bear lives in cold places.'],                  fillQ:'The {blank} is walking on ice.'},
  {id:'hippo',    word:'Hippo',      set:1, sentences:['This is a hippo.','The hippo is big and lives in water.','The hippo has a big mouth.'],                    fillQ:'The {blank} is sitting in the water.'},
  {id:'parrot',   word:'Parrot',     set:1, sentences:['This is a parrot.','The parrot has many colors.','The parrot can talk.'],                                  fillQ:'The {blank} is talking.'},
  {id:'rhino',    word:'Rhino',      set:1, sentences:['This is a rhino.','The rhino has a big horn.','The rhino is very strong.'],                                fillQ:'The {blank} is walking in the grass.'},
];

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let currentSet=0,selAnimalIdx=0;
let fcMode='',fcList=[],fcIdx=0,fcTapState=0;
let matchSel={img:null,word:null},matchCorrect=0;
let fillIdx=0,fillList=[],fillAnswered=false;

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;};
const setAnimals=()=>ANIMALS.filter(a=>a.set===currentSet);
const imgSrc=(id,sfx='')=>id.replace(' ','')+sfx+'.jpg';

function setImg(imgEl,phEl,id,sfx){
  const src=imgSrc(id,sfx);
  imgEl.src=src; imgEl.alt=id;
  imgEl.style.display='block'; phEl.style.display='none';
  imgEl.onerror=()=>{imgEl.style.display='none';phEl.textContent=EMOJIS[id]||'❓';phEl.style.display='flex';};
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
let currentActivity='';

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  const nav=document.getElementById('bottom-nav');
  if(id==='home-screen'){nav.classList.remove('visible');}
  else{nav.classList.add('visible');}
}
function goHome(){showScreen('home-screen');}

// Bottom nav: switch set then restart same activity
function bnSwitch(setIdx, act){
  currentSet=setIdx;
  updateBnavSets();
  // restart current activity with new set
  const a=currentActivity||act;
  startActivity(a);
}
// Bottom nav: switch activity, keep current set
function bnActivity(act){
  startActivity(act);
}
function updateBnavSets(){
  document.getElementById('bn-s1').classList.toggle('active', currentSet===0);
  document.getElementById('bn-s2').classList.toggle('active', currentSet===1);
}
function updateBnavActivity(act){
  document.getElementById('bn-wf').classList.toggle('active', act==='learn11');
  document.getElementById('bn-pf').classList.toggle('active', act==='learn12');
  document.getElementById('bn-match').classList.toggle('active', act==='match');
  document.getElementById('bn-fill').classList.toggle('active', act==='fill');
}

// ══════════════════════════════════════
// HOME — stub (no hero/pills needed)
// ══════════════════════════════════════
function switchSet(idx){ currentSet=idx; }
function buildPills(){}
function updateHero(){}

// ══════════════════════════════════════
// START ACTIVITY
// ══════════════════════════════════════
function startActivity(act){
  currentActivity=act;
  updateBnavSets();
  updateBnavActivity(act);
  if(act==='learn11'||act==='learn12'){
    fcMode=act; fcList=[...setAnimals()]; fcIdx=0;
    document.getElementById('fc-mode-label').textContent=act==='learn11'?'📖 Word First':'🖼️ Picture First';
    buildDots();
    showScreen('flashcard-screen');
    document.getElementById('fc-finish').style.display='none';
    document.getElementById('fc-slide').style.display='flex';
    renderFC();
  } else if(act==='match'){
    showScreen('match-screen');
    document.getElementById('match-finish').style.display='none';
    document.getElementById('match-main').style.display='block';
    initMatch();
  } else if(act==='fill'){
    fillList=shuffle([...setAnimals()]); fillIdx=0;
    showScreen('fill-screen');
    document.getElementById('fill-finish').style.display='none';
    document.getElementById('fill-main').style.display='block';
    renderFill();
  }
}

// ══════════════════════════════════════
// FLASHCARD
// ══════════════════════════════════════
function buildDots(){
  const dr=document.getElementById('fc-dots'); dr.innerHTML='';
  fcList.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.id='fcd'+i;dr.appendChild(d);});
}
function updateDots(){
  fcList.forEach((_,i)=>{
    const d=document.getElementById('fcd'+i);
    if(d)d.className='dot'+(i<fcIdx?' done':i===fcIdx?' active':'');
  });
}

function resetSlide(){
  document.getElementById('fc-slide').classList.remove('word-only');
  document.getElementById('fc-word').style.display='none';
  document.getElementById('fc-img1-wrap').style.display='none';
  document.getElementById('fc-img2-wrap').style.display='none';
  ['fc-s1','fc-s2','fc-s3'].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove('show');
  });
  document.getElementById('fc-hint').textContent='Tap to continue →';
  document.getElementById('fc-hint').style.display='block';
  fcTapState=0;
}

function renderFC(){
  const a=fcList[fcIdx];
  const accent=ACCENTS[fcIdx%ACCENTS.length];
  document.getElementById('fc-progress').textContent=(fcIdx+1)+' / '+fcList.length;
  document.getElementById('fc-word').textContent=a.word;
  document.getElementById('fc-word').style.color=accent;
  ['fc-s1','fc-s2','fc-s3'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.textContent=a.sentences[i];
    el.style.borderTopColor=accent;
  });
  setImg(document.getElementById('fc-img1'),document.getElementById('fc-img1-ph'),a.id,'');
  setImg(document.getElementById('fc-img2'),document.getElementById('fc-img2-ph'),a.id,'1');
  resetSlide();
  updateDots();
  // show initial state
  if(fcMode==='learn11'){
    document.getElementById('fc-word').style.display='block';
    document.getElementById('fc-slide').classList.add('word-only');
    // ensure word is before images in DOM (already is)
  } else {
    // picture first: move word AFTER img1 in DOM so it shows below
    const slide=document.getElementById('fc-slide');
    const wordEl=document.getElementById('fc-word');
    const img1wrap=document.getElementById('fc-img1-wrap');
    img1wrap.after(wordEl);
    document.getElementById('fc-img1-wrap').style.display='block';
  }
}

function fcTap(){
  fcTapState++;
  if(fcMode==='learn11'){
    // word → cat.jpg → cat1.jpg+s1 → s2 → s3 → next
    if(fcTapState===1){
      document.getElementById('fc-slide').classList.remove('word-only');
      document.getElementById('fc-img1-wrap').style.display='block';
    } else if(fcTapState===2){
      document.getElementById('fc-img1-wrap').style.display='none';
      document.getElementById('fc-img2-wrap').style.display='block';
      document.getElementById('fc-s1').classList.add('show');
    } else if(fcTapState===3){
      document.getElementById('fc-s2').classList.add('show');
    } else if(fcTapState===4){
      document.getElementById('fc-s3').classList.add('show');
      document.getElementById('fc-hint').textContent='Tap for next animal →';
    } else {
      fcAdvance();
    }
  } else {
    // cat.jpg → word (below img) → cat1.jpg+s1 → s2 → s3 → next
    if(fcTapState===1){
      document.getElementById('fc-word').style.display='block';
    } else if(fcTapState===2){
      // move word back before sentences (above img2)
      const slide=document.getElementById('fc-slide');
      const wordEl=document.getElementById('fc-word');
      const s1=document.getElementById('fc-s1');
      slide.insertBefore(wordEl,s1);
      document.getElementById('fc-img1-wrap').style.display='none';
      document.getElementById('fc-img2-wrap').style.display='block';
      document.getElementById('fc-s1').classList.add('show');
    } else if(fcTapState===3){
      document.getElementById('fc-s2').classList.add('show');
    } else if(fcTapState===4){
      document.getElementById('fc-s3').classList.add('show');
      document.getElementById('fc-hint').textContent='Tap for next animal →';
    } else {
      fcAdvance();
    }
  }
}

function fcAdvance(){
  fcIdx++;
  if(fcIdx>=fcList.length){
    document.getElementById('fc-slide').style.display='none';
    document.getElementById('fc-finish').style.display='block';
  } else {
    renderFC();
  }
}
function restartFC(){
  fcIdx=0; buildDots();
  document.getElementById('fc-slide').style.display='flex';
  document.getElementById('fc-finish').style.display='none';
  renderFC();
}

// ══════════════════════════════════════
// MATCH
// ══════════════════════════════════════
function initMatch(){
  const animals=setAnimals();
  matchSel={img:null,word:null}; matchCorrect=0;
  document.getElementById('match-score-top').textContent='0 matched';
  const grid=document.getElementById('match-grid');
  const wordsEl=document.getElementById('match-words');
  grid.innerHTML=''; wordsEl.innerHTML='';

  shuffle(animals).forEach(a=>{
    const card=document.createElement('div');
    card.className='match-img-card'; card.dataset.id=a.id;
    const img=document.createElement('img');
    img.src=imgSrc(a.id,''); img.alt=a.word;
    img.onerror=()=>{img.style.display='none';const s=document.createElement('span');s.className='m-ph';s.textContent=EMOJIS[a.id]||'❓';card.appendChild(s);};
    card.appendChild(img);
    card.addEventListener('click',()=>matchTapImg(card,a.id));
    grid.appendChild(card);
  });

  shuffle(animals).forEach(a=>{
    const pill=document.createElement('button');
    pill.className='match-word-pill'; pill.dataset.id=a.id; pill.textContent=a.word;
    pill.addEventListener('click',()=>matchTapWord(pill,a.id));
    wordsEl.appendChild(pill);
  });
}

function matchTapImg(card,id){
  if(card.classList.contains('correct'))return;
  document.querySelectorAll('.match-img-card.selected').forEach(c=>c.classList.remove('selected'));
  card.classList.add('selected'); matchSel.img=id; checkPair();
}
function matchTapWord(pill,id){
  if(pill.classList.contains('correct'))return;
  document.querySelectorAll('.match-word-pill.selected').forEach(p=>p.classList.remove('selected'));
  pill.classList.add('selected'); matchSel.word=id; checkPair();
}
function checkPair(){
  if(!matchSel.img||!matchSel.word)return;
  const total=setAnimals().length;
  if(matchSel.img===matchSel.word){
    document.querySelector(`.match-img-card[data-id="${matchSel.img}"]`).classList.replace('selected','correct');
    document.querySelector(`.match-word-pill[data-id="${matchSel.word}"]`).classList.replace('selected','correct');
    matchCorrect++;
    document.getElementById('match-score-top').textContent=matchCorrect+' matched';
    matchSel={img:null,word:null};
    if(matchCorrect===total){
      setTimeout(()=>{
        document.getElementById('match-main').style.display='none';
        document.getElementById('match-finish-msg').textContent='You matched all '+total+' animals! 🎉';
        document.getElementById('match-finish').style.display='block';
      },500);
    }
  } else {
    const ic=document.querySelector(`.match-img-card[data-id="${matchSel.img}"]`);
    const wp=document.querySelector(`.match-word-pill[data-id="${matchSel.word}"]`);
    ic.classList.add('wrong'); wp.classList.add('wrong');
    setTimeout(()=>{
      ic.classList.remove('selected','wrong');
      wp.classList.remove('selected','wrong');
      matchSel={img:null,word:null};
    },500);
  }
}

// ══════════════════════════════════════
// FILL IN THE BLANK
// ══════════════════════════════════════
function initFill(){
  fillList=shuffle([...setAnimals()]); fillIdx=0;
  document.getElementById('fill-finish').style.display='none';
  document.getElementById('fill-main').style.display='block';
  renderFill();
}

function renderFill(){
  document.getElementById('fill-progress').textContent=(fillIdx+1)+' / '+fillList.length;
  const a=fillList[fillIdx]; fillAnswered=false;
  const others=setAnimals().filter(x=>x.id!==a.id);
  const choices=shuffle([a.word,...shuffle(others).slice(0,2).map(x=>x.word)]);
  // Build sentence: replace {blank} — no underscores in source data
  const sentHTML=a.fillQ.replace('{blank}','<span class="fill-blank" id="fill-blank">?</span>');
  document.getElementById('fill-main').innerHTML=`
    <div class="fill-card">
      <img class="fill-img" src="${imgSrc(a.id,'1')}" alt="${a.word}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
      <div class="fill-img-ph">${EMOJIS[a.id]||'❓'}</div>
      <div class="fill-sentence">${sentHTML}</div>
      <div class="fill-choices">
        ${choices.map(c=>`<button class="fill-choice" onclick="fillCheck(this,'${c.replace(/'/g,"\\'")}','${a.word.replace(/'/g,"\\'")}')">${c}</button>`).join('')}
      </div>
      <div class="fill-feedback" id="fill-fb"></div>
      <button class="fill-next-btn" id="fill-next-btn" onclick="fillNext()">Next →</button>
    </div>`;
}

function fillCheck(btn,chosen,correct){
  if(fillAnswered)return;
  if(chosen===correct){
    fillAnswered=true;
    document.getElementById('fill-blank').textContent=correct;
    document.getElementById('fill-blank').classList.add('correct');
    document.querySelectorAll('.fill-choice').forEach(b=>b.disabled=true);
    btn.classList.add('correct-choice');
    document.getElementById('fill-fb').textContent='✅ Correct!';
    document.getElementById('fill-fb').className='fill-feedback ok';
    document.getElementById('fill-next-btn').classList.add('show');
  } else {
    btn.classList.add('wrong-choice');
    document.getElementById('fill-fb').textContent='❌ Try again!';
    document.getElementById('fill-fb').className='fill-feedback no';
    setTimeout(()=>{btn.classList.remove('wrong-choice');document.getElementById('fill-fb').textContent='';},700);
  }
}

function fillNext(){
  fillIdx++;
  if(fillIdx>=fillList.length){
    document.getElementById('fill-main').style.display='none';
    document.getElementById('fill-finish').style.display='block';
  } else { renderFill(); }
}

// ══════════════════════════════════════
// BUBBLES
// ══════════════════════════════════════
(function(){
  const cv=document.getElementById('bubble-canvas');
  const cx=cv.getContext('2d');
  const cols=['#7C3AED','#FF6B6B','#3B82F6','#6BCB77','#FF9F43','#FFD93D'];
  let bs=[];
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<14;i++){
    const r=22+Math.random()*48;
    bs.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r,
      dx:(Math.random()-.5)*.55,dy:(Math.random()-.5)*.55,col:cols[i%cols.length]});
  }
  function draw(){
    cx.clearRect(0,0,cv.width,cv.height);
    bs.forEach(b=>{
      b.x+=b.dx; b.y+=b.dy;
      if(b.x<-b.r)b.x=cv.width+b.r; if(b.x>cv.width+b.r)b.x=-b.r;
      if(b.y<-b.r)b.y=cv.height+b.r; if(b.y>cv.height+b.r)b.y=-b.r;
      cx.globalAlpha=.12;
      cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fillStyle=b.col;cx.fill();
      cx.globalAlpha=.28;
      cx.beginPath();cx.arc(b.x-b.r*.28,b.y-b.r*.28,b.r*.2,0,Math.PI*2);cx.fillStyle='#fff';cx.fill();
      cx.globalAlpha=1;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// INIT
currentSet=0;
